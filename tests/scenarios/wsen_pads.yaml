driver: wsen-pads
module_name: wsen_pads
driver_class: WSEN_PADS
i2c_address: 0x5D

# I2C config for hardware tests (STeaMi board - STM32WB55)
i2c:
  id: 1

# Register values for mock tests
# These simulate a real WSEN-PADS sensor
mock_registers:
  # DEVICE_ID (expected 0xB3)
  0x0F: 0xB3
  # INT_SOURCE (BOOT_ON=0, no interrupts)
  0x24: 0x00
  # CTRL_1 (power down, BDU enabled)
  0x10: 0x02
  # CTRL_2 (auto-increment enabled)
  0x11: 0x10
  # STATUS (pressure and temperature data available)
  0x27: 0x03
  # INT_CFG (default)
  0x0B: 0x00
  # DATA_P_XL..DATA_P_H (simulated ~1013.25 hPa: 1013.25 * 4096 = 4150272 = 0x3F5400)
  0x28: [0x00, 0x54, 0x3F]
  # DATA_T_L..DATA_T_H (simulated ~25.00°C: 25.00 / 0.01 = 2500 = 0x09C4)
  0x2B: [0xC4, 0x09]

tests:
  - name: "Verify device ID register"
    action: read_register
    register: 0x0F
    expect: 0xB3
    mode: [mock, hardware]

  - name: "Read device ID via method"
    action: call
    method: device_id
    expect: 0xB3
    mode: [mock, hardware]

  - name: "Read status register"
    action: call
    method: _status
    expect_not_none: true
    mode: [mock, hardware]

  - name: "Read pressure returns float"
    action: call
    method: pressure_hpa
    expect_range: [1013.0, 1014.0]
    mode: [mock]

  - name: "Read temperature returns float"
    action: call
    method: temperature
    expect_range: [24.9, 25.1]
    mode: [mock]

  - name: "Temperature with offset"
    action: script
    script: |
      dev.set_temp_offset(-2.0)
      result = dev.temperature()
    expect_range: [22.0, 24.0]
    mode: [mock]

  - name: "Temperature with two-point calibration"
    action: script
    script: |
      dev.calibrate_temperature(20.0, 25.0, 30.0, 35.0)
      result = dev.temperature()
    expect_range: [19.0, 21.0]
    mode: [mock]

  - name: "Read applies temperature calibration"
    action: script
    script: |
      dev.set_temp_offset(-2.0)
      _, temp = dev.read()
      result = temp
    expect_range: [22.0, 24.0]
    mode: [mock]

  - name: "Timeout raises exception when data never ready"
    action: script
    script: |
      dev.power_off()
      i2c._registers[0x27] = bytes([0x00])
      try:
          dev.pressure_hpa()
          result = False
      except Exception:
          result = True
      i2c._registers[0x27] = bytes([0x03])
    expect_true: true
    mode: [mock]

  - name: "Pressure in plausible range"
    action: call
    method: pressure_hpa
    expect_range: [900.0, 1100.0]
    mode: [hardware]

  - name: "Temperature in plausible range"
    action: call
    method: temperature
    expect_range: [-10.0, 60.0]
    mode: [hardware]

  - name: "Pressure and temperature feel correct"
    action: manual
    display:
      - method: pressure_hpa
        label: "Pressure"
        unit: "hPa"
      - method: temperature
        label: "Temperature"
        unit: "°C"
    prompt: "Ces valeurs sont-elles cohérentes (pression ~1013 hPa, température ambiante) ?"
    expect_true: true
    mode: [hardware]

  # ---------------------------------------------------------------------------
  # Init / identification
  # ---------------------------------------------------------------------------

  - name: "Device absent raises exception"
    action: script
    script: |
      from wsen_pads import WSEN_PADS
      from wsen_pads.exceptions import WSENPADSDeviceNotFound

      try:
          i2c.scan = lambda: []
          WSEN_PADS(i2c, address=0x5D)
          result = False
      except WSENPADSDeviceNotFound:
          result = True
      except Exception:
          result = False
    expect_true: true
    mode: [mock]

  - name: "Invalid DEVICE_ID raises exception"
    action: script
    script: |
      from wsen_pads import WSEN_PADS
      from wsen_pads.exceptions import WSENPADSInvalidDevice

      original = i2c._registers[0x0F]
      i2c._registers[0x0F] = bytes([0x00])

      try:
          WSEN_PADS(i2c, address=0x5D)
          result = False
      except WSENPADSInvalidDevice:
          result = True
      except Exception:
          result = False

      i2c._registers[0x0F] = original
    expect_true: true
    mode: [mock]

  - name: "Boot timeout raises exception at init"
    action: script
    script: |
      from wsen_pads import WSEN_PADS
      from wsen_pads.exceptions import WSENPADSTimeout

      original = i2c._registers[0x24]
      i2c._registers[0x24] = bytes([0x80])  # INT_SOURCE_BOOT_ON

      try:
          WSEN_PADS(i2c, address=0x5D)
          result = False
      except WSENPADSTimeout:
          result = True
      except Exception:
          result = False

      i2c._registers[0x24] = original
    expect_true: true
    mode: [mock]

  # ---------------------------------------------------------------------------
  # Continuous mode validation
  # ---------------------------------------------------------------------------

  - name: "set_continuous rejects invalid ODR"
    action: script
    script: |
      try:
          dev.set_continuous(odr=99)
          result = False
      except ValueError:
          result = True
      except Exception:
          result = False
    expect_true: true
    mode: [mock]

  - name: "set_continuous rejects low-noise at 100 Hz"
    action: script
    script: |
      try:
          dev.set_continuous(odr=0x06, low_noise=True)
          result = False
      except ValueError:
          result = True
      except Exception:
          result = False
    expect_true: true
    mode: [mock]

  - name: "set_continuous rejects low-noise at 200 Hz"
    action: script
    script: |
      try:
          dev.set_continuous(odr=0x07, low_noise=True)
          result = False
      except ValueError:
          result = True
      except Exception:
          result = False
    expect_true: true
    mode: [mock]

  # ---------------------------------------------------------------------------
  # Status helpers
  # ---------------------------------------------------------------------------

  - name: "pressure_ready false when status empty"
    action: script
    script: |
      i2c._registers[0x27] = bytes([0x00])
      result = dev.pressure_ready()
      i2c._registers[0x27] = bytes([0x03])
    expect_false: true
    mode: [mock]

  - name: "temperature_ready false when status empty"
    action: script
    script: |
      i2c._registers[0x27] = bytes([0x00])
      result = dev.temperature_ready()
      i2c._registers[0x27] = bytes([0x03])
    expect_false: true
    mode: [mock]

  - name: "data_ready false when status empty"
    action: script
    script: |
      i2c._registers[0x27] = bytes([0x00])
      result = dev.data_ready()
      i2c._registers[0x27] = bytes([0x03])
    expect_false: true
    mode: [mock]

  - name: "pressure_ready true when only pressure available"
    action: script
    script: |
      i2c._registers[0x27] = bytes([0x01])  # STATUS_P_DA
      result = dev.pressure_ready()
      i2c._registers[0x27] = bytes([0x03])
    expect_true: true
    mode: [mock]

  - name: "temperature_ready true when only temperature available"
    action: script
    script: |
      i2c._registers[0x27] = bytes([0x02])  # STATUS_T_DA
      result = dev.temperature_ready()
      i2c._registers[0x27] = bytes([0x03])
    expect_true: true
    mode: [mock]

  - name: "data_ready false when only pressure available"
    action: script
    script: |
      i2c._registers[0x27] = bytes([0x01])  # STATUS_P_DA
      result = dev.data_ready()
      i2c._registers[0x27] = bytes([0x03])
    expect_false: true
    mode: [mock]

  - name: "data_ready false when only temperature available"
    action: script
    script: |
      i2c._registers[0x27] = bytes([0x02])  # STATUS_T_DA
      result = dev.data_ready()
      i2c._registers[0x27] = bytes([0x03])
    expect_false: true
    mode: [mock]

  - name: "data_ready true when pressure and temperature available"
    action: script
    script: |
      i2c._registers[0x27] = bytes([0x03])  # STATUS_P_DA | STATUS_T_DA
      result = dev.data_ready()
    expect_true: true
    mode: [mock]

  # ---------------------------------------------------------------------------
  # Reset / reboot
  # ---------------------------------------------------------------------------

  - name: "soft_reset reapplies default configuration"
    action: script
    script: |
      dev.set_continuous(odr=0x03, low_noise=True, low_pass=True, low_pass_strong=True)
      dev.soft_reset()

      ctrl1 = i2c._registers[0x10][0]
      ctrl2 = i2c._registers[0x11][0]

      bdu_ok = (ctrl1 & 0x02) == 0x02
      odr_power_down = (ctrl1 & 0x70) == 0x00
      auto_inc_ok = (ctrl2 & 0x10) == 0x10
      low_noise_off = (ctrl2 & 0x02) == 0x00

      result = bdu_ok and odr_power_down and auto_inc_ok and low_noise_off
    expect_true: true
    mode: [mock]

  - name: "reboot reapplies default configuration"
    action: script
    script: |
      dev.set_continuous(odr=0x03, low_noise=False, low_pass=True, low_pass_strong=True)
      i2c._registers[0x24] = bytes([0x00])  # boot already finished
      dev.reboot()

      ctrl1 = i2c._registers[0x10][0]
      ctrl2 = i2c._registers[0x11][0]

      bdu_ok = (ctrl1 & 0x02) == 0x02
      odr_power_down = (ctrl1 & 0x70) == 0x00
      auto_inc_ok = (ctrl2 & 0x10) == 0x10
      low_noise_off = (ctrl2 & 0x02) == 0x00

      result = bdu_ok and odr_power_down and auto_inc_ok and low_noise_off
    expect_true: true
    mode: [mock]

  # ---------------------------------------------------------------------------
  # Calibration
  # ---------------------------------------------------------------------------

  - name: "Temperature calibration rejects identical measured points"
    action: script
    script: |
      try:
          dev.calibrate_temperature(20.0, 25.0, 30.0, 25.0)
          result = False
      except ValueError:
          result = True
      except Exception:
          result = False
    expect_true: true
    mode: [mock]
