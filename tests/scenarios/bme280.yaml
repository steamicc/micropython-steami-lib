driver: bme280
driver_class: BME280
i2c_address: 0x76

i2c:
  id: 1

mock_registers:
  # Chip ID (expected 0x60)
  0xD0: 0x60
  # Status (not measuring, NVM copy done)
  0xF3: 0x00

  # Data registers 0xF7..0xFE (8 bytes): raw_press=415148, raw_temp=519888, raw_hum=28680
  # Expected compensated: ~25.08°C, ~1009.21 hPa, ~50.57 %RH
  0xF7: [0x65, 0x5A, 0xC0, 0x7E, 0xED, 0x00, 0x70, 0x08]
  # ctrl_hum (default)
  0xF2: 0x00
  # ctrl_meas (default sleep mode)
  0xF4: 0x00
  # config (default)
  0xF5: 0x00

  # Calibration block 1: 0x88, 26 bytes
  # dig_T1=27504(u16) dig_T2=26435(s16) dig_T3=-1000(s16)
  # dig_P1=36381(u16) dig_P2=-10685(s16) dig_P3=3024(s16)
  # dig_P4=2855(s16) dig_P5=140(s16) dig_P6=-7(s16)
  # dig_P7=15500(s16) dig_P8=-14600(s16) dig_P9=6000(s16)
  # _=0 dig_H1=75(u8)
  0x88: [0x70, 0x6B, 0x43, 0x67, 0x18, 0xFC,
         0x1D, 0x8E, 0x43, 0xD6, 0xD0, 0x0B,
         0x27, 0x0B, 0x8C, 0x00, 0xF9, 0xFF,
         0x8C, 0x3C, 0xF8, 0xC6, 0x70, 0x17,
         0x00, 0x4B]

  # Calibration block 2: 0xE1, 7 bytes
  # dig_H2=366(s16) dig_H3=0(u8)
  # dig_H4=306(s12) dig_H5=57(s12) dig_H6=30(s8)
  0xE1: [0x6E, 0x01, 0x00, 0x13, 0x92, 0x03, 0x1E]

tests:
  - name: "Verify chip ID register"
    action: read_register
    register: 0xD0
    expect: 0x60
    mode: [mock, hardware]

  - name: "Read chip ID via method"
    action: call
    method: device_id
    expect: 0x60
    mode: [mock, hardware]

  - name: "Soft reset sends reset command"
    action: script
    script: |
      i2c.clear_write_log()
      dev.soft_reset()
      log = i2c.get_write_log()
      sent_reset = any(reg == 0xE0 and data[0] == 0xB6 for reg, data in log)
      result = sent_reset
    expect_true: true
    mode: [mock]

  - name: "Reset reconfigures device"
    action: script
    script: |
      i2c.clear_write_log()
      dev.reset()
      log = i2c.get_write_log()
      wrote_reset = any(reg == 0xE0 for reg, data in log)
      wrote_ctrl_hum = any(reg == 0xF2 for reg, data in log)
      wrote_ctrl_meas = any(reg == 0xF4 for reg, data in log)
      result = wrote_reset and wrote_ctrl_hum and wrote_ctrl_meas
    expect_true: true
    mode: [mock]

  # ----- Calibration -----

  - name: "Calibration data parsed correctly for temperature"
    action: script
    script: |
      result = (
          dev.dig_T1 == 27504
          and dev.dig_T2 == 26435
          and dev.dig_T3 == -1000
      )
    expect_true: true
    mode: [mock]

  - name: "Calibration data parsed correctly for pressure"
    action: script
    script: |
      result = (
          dev.dig_P1 == 36381
          and dev.dig_P2 == -10685
          and dev.dig_P9 == 6000
      )
    expect_true: true
    mode: [mock]

  - name: "Calibration data parsed correctly for humidity"
    action: script
    script: |
      result = (
          dev.dig_H1 == 75
          and dev.dig_H2 == 366
          and dev.dig_H3 == 0
          and dev.dig_H6 == 30
      )
    expect_true: true
    mode: [mock]

  - name: "H4 and H5 cross-register parsing"
    action: script
    script: |
      # From mock: hum bytes [0x6E, 0x01, 0x00, 0x13, 0x92, 0x03, 0x1E]
      # H4 = (hum[3] << 4) | (hum[4] & 0x0F) = (0x13 << 4) | (0x92 & 0x0F) = 0x132 = 306, then sign
      # H5 = (hum[4] >> 4) | (hum[5] << 4) = (0x92 >> 4) | (0x03 << 4) = 0x09 | 0x30 = 0x39 = 57
      result = (
          dev.dig_H4 == 306
          and dev.dig_H5 == 57
      )
    expect_true: true
    mode: [mock]

  - name: "t_fine initialized to zero"
    action: script
    script: |
      result = dev.t_fine == 0
    expect_true: true
    mode: [mock]

  - name: "Init reads STATUS before calibration registers"
    action: script
    script: |
      # The full init I2C log should show:
      # 1. Read chip ID (0xD0)
      # 2. Read STATUS (0xF3) — _wait_boot before calibration
      # 3. Read calibration block 1 (0x88)
      # 4. Read calibration block 2 (0xE1)
      # 5. Write ctrl_hum (0xF2) + ctrl_meas (0xF4)
      # We re-instantiate to capture the full init sequence
      i2c.clear_read_log()
      from bme280 import BME280
      dev2 = BME280(i2c, address=0x76)
      log = i2c.get_read_log()
      regs_read = [reg for reg in log]
      # STATUS (0xF3) must appear before calibration (0x88)
      status_idx = None
      calib_idx = None
      for idx, reg in enumerate(regs_read):
          if reg == 0xF3 and status_idx is None:
              status_idx = idx
          if reg == 0x88 and calib_idx is None:
              calib_idx = idx
      result = (
          status_idx is not None
          and calib_idx is not None
          and status_idx < calib_idx
      )
    expect_true: true
    mode: [mock]

  - name: "wait_boot polls STATUS until IM_UPDATE clears"
    action: script
    script: |
      # Simulate NVM copy in progress: STATUS returns 0x01 twice, then 0x00
      i2c.set_register_sequence(0xF3, [bytes([0x01]), bytes([0x01]), bytes([0x00])])
      i2c.clear_read_log()
      from bme280 import BME280
      dev2 = BME280(i2c, address=0x76)
      log = i2c.get_read_log()
      # STATUS (0xF3) should have been read at least 3 times during boot
      status_reads = [r for r in log if r == 0xF3]
      result = len(status_reads) >= 3
    expect_true: true
    mode: [mock]

  # ----- Status -----

  - name: "data_ready returns True when not measuring"
    action: script
    script: |
      result = dev.data_ready()
    expect_true: true
    mode: [mock]

  - name: "temperature_ready delegates to data_ready"
    action: script
    script: |
      result = dev.temperature_ready() and dev.pressure_ready() and dev.humidity_ready()
    expect_true: true
    mode: [mock]

  # ----- Compensated readings -----

  - name: "Temperature returns correct value from raw data"
    action: script
    script: |
      temp = dev.temperature()
      result = abs(temp - 25.08) < 0.1
    expect_true: true
    mode: [mock]

  - name: "Pressure returns correct value from raw data"
    action: script
    script: |
      press = dev.pressure_hpa()
      result = abs(press - 1009.21) < 0.5
    expect_true: true
    mode: [mock]

  - name: "Humidity returns correct value from raw data"
    action: script
    script: |
      hum = dev.humidity()
      result = abs(hum - 50.57) < 0.5
    expect_true: true
    mode: [mock]

  - name: "read() returns (temp, press, hum) tuple"
    action: script
    script: |
      t, p, h = dev.read()
      result = (
          abs(t - 25.08) < 0.1
          and abs(p - 1009.21) < 0.5
          and abs(h - 50.57) < 0.5
      )
    expect_true: true
    mode: [mock]

  - name: "t_fine updated after temperature read"
    action: script
    script: |
      dev.temperature()
      result = dev.t_fine == 128422
    expect_true: true
    mode: [mock]

  - name: "trigger_one_shot writes forced mode to ctrl_meas"
    action: script
    script: |
      i2c.clear_write_log()
      dev.trigger_one_shot()
      log = i2c.get_write_log()
      wrote_forced = any(
          reg == 0xF4 and (data[0] & 0x03) == 0x01
          for reg, data in log
      )
      result = wrote_forced
    expect_true: true
    mode: [mock]

  - name: "read_one_shot triggers and reads"
    action: script
    script: |
      i2c.clear_write_log()
      t, p, h = dev.read_one_shot()
      log = i2c.get_write_log()
      triggered = any(reg == 0xF4 for reg, data in log)
      result = triggered and abs(t - 25.08) < 0.1
    expect_true: true
    mode: [mock]
