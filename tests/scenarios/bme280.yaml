driver: bme280
driver_class: BME280
i2c_address: 0x76

i2c:
  id: 1

mock_registers:
  # Chip ID (expected 0x60)
  0xD0: 0x60
  # Status (not measuring, NVM copy done)
  0xF3: 0x00

  # Data registers 0xF7..0xFE (8 bytes): raw_press=415148, raw_temp=519888, raw_hum=28680
  # Expected compensated: ~25.08°C, ~1009.21 hPa, ~50.57 %RH
  0xF7: [0x65, 0x5A, 0xC0, 0x7E, 0xED, 0x00, 0x70, 0x08]
  # ctrl_hum (default)
  0xF2: 0x00
  # ctrl_meas (default sleep mode)
  0xF4: 0x00
  # config (default)
  0xF5: 0x00

  # Calibration block 1: 0x88, 26 bytes
  # dig_T1=27504(u16) dig_T2=26435(s16) dig_T3=-1000(s16)
  # dig_P1=36381(u16) dig_P2=-10685(s16) dig_P3=3024(s16)
  # dig_P4=2855(s16) dig_P5=140(s16) dig_P6=-7(s16)
  # dig_P7=15500(s16) dig_P8=-14600(s16) dig_P9=6000(s16)
  # _=0 dig_H1=75(u8)
  0x88: [0x70, 0x6B, 0x43, 0x67, 0x18, 0xFC,
         0x1D, 0x8E, 0x43, 0xD6, 0xD0, 0x0B,
         0x27, 0x0B, 0x8C, 0x00, 0xF9, 0xFF,
         0x8C, 0x3C, 0xF8, 0xC6, 0x70, 0x17,
         0x00, 0x4B]

  # Calibration block 2: 0xE1, 7 bytes
  # dig_H2=366(s16) dig_H3=0(u8)
  # dig_H4=306(s12) dig_H5=57(s12) dig_H6=30(s8)
  0xE1: [0x6E, 0x01, 0x00, 0x13, 0x92, 0x03, 0x1E]

tests:
  - name: "Verify chip ID register"
    action: read_register
    register: 0xD0
    expect: 0x60
    mode: [mock, hardware]

  - name: "Read chip ID via method"
    action: call
    method: device_id
    expect: 0x60
    mode: [mock, hardware]

  - name: "Soft reset sends reset command"
    action: script
    script: |
      i2c.clear_write_log()
      dev.soft_reset()
      log = i2c.get_write_log()
      sent_reset = any(reg == 0xE0 and data[0] == 0xB6 for reg, data in log)
      result = sent_reset
    expect_true: true
    mode: [mock]

  - name: "Reset reconfigures device"
    action: script
    script: |
      i2c.clear_write_log()
      dev.reset()
      log = i2c.get_write_log()
      wrote_reset = any(reg == 0xE0 for reg, data in log)
      wrote_ctrl_hum = any(reg == 0xF2 for reg, data in log)
      wrote_ctrl_meas = any(reg == 0xF4 for reg, data in log)
      result = wrote_reset and wrote_ctrl_hum and wrote_ctrl_meas
    expect_true: true
    mode: [mock]

  # ----- Calibration -----

  - name: "Calibration data parsed correctly for temperature"
    action: script
    script: |
      result = (
          dev.dig_T1 == 27504
          and dev.dig_T2 == 26435
          and dev.dig_T3 == -1000
      )
    expect_true: true
    mode: [mock]

  - name: "Calibration data parsed correctly for pressure"
    action: script
    script: |
      result = (
          dev.dig_P1 == 36381
          and dev.dig_P2 == -10685
          and dev.dig_P9 == 6000
      )
    expect_true: true
    mode: [mock]

  - name: "Calibration data parsed correctly for humidity"
    action: script
    script: |
      result = (
          dev.dig_H1 == 75
          and dev.dig_H2 == 366
          and dev.dig_H3 == 0
          and dev.dig_H6 == 30
      )
    expect_true: true
    mode: [mock]

  - name: "H4 and H5 cross-register parsing"
    action: script
    script: |
      # From mock: hum bytes [0x6E, 0x01, 0x00, 0x13, 0x92, 0x03, 0x1E]
      # H4 = (hum[3] << 4) | (hum[4] & 0x0F) = (0x13 << 4) | (0x92 & 0x0F) = 0x132 = 306, then sign
      # H5 = (hum[4] >> 4) | (hum[5] << 4) = (0x92 >> 4) | (0x03 << 4) = 0x09 | 0x30 = 0x39 = 57
      result = (
          dev.dig_H4 == 306
          and dev.dig_H5 == 57
      )
    expect_true: true
    mode: [mock]

  - name: "t_fine initialized to zero"
    action: script
    script: |
      result = dev.t_fine == 0
    expect_true: true
    mode: [mock]

  - name: "Init reads STATUS before calibration registers"
    action: script
    script: |
      # The full init I2C log should show:
      # 1. Read chip ID (0xD0)
      # 2. Read STATUS (0xF3) — _wait_boot before calibration
      # 3. Read calibration block 1 (0x88)
      # 4. Read calibration block 2 (0xE1)
      # 5. Write ctrl_hum (0xF2) + ctrl_meas (0xF4)
      # We re-instantiate to capture the full init sequence
      i2c.clear_read_log()
      from bme280 import BME280
      dev2 = BME280(i2c, address=0x76)
      log = i2c.get_read_log()
      regs_read = [reg for reg in log]
      # STATUS (0xF3) must appear before calibration (0x88)
      status_idx = None
      calib_idx = None
      for idx, reg in enumerate(regs_read):
          if reg == 0xF3 and status_idx is None:
              status_idx = idx
          if reg == 0x88 and calib_idx is None:
              calib_idx = idx
      result = (
          status_idx is not None
          and calib_idx is not None
          and status_idx < calib_idx
      )
    expect_true: true
    mode: [mock]

  - name: "wait_boot polls STATUS until IM_UPDATE clears"
    action: script
    script: |
      # Simulate NVM copy in progress: STATUS returns 0x01 twice, then 0x00
      i2c.set_register_sequence(0xF3, [bytes([0x01]), bytes([0x01]), bytes([0x00])])
      i2c.clear_read_log()
      from bme280 import BME280
      dev2 = BME280(i2c, address=0x76)
      log = i2c.get_read_log()
      # STATUS (0xF3) should have been read at least 3 times during boot
      status_reads = [r for r in log if r == 0xF3]
      result = len(status_reads) >= 3
    expect_true: true
    mode: [mock]

  # ----- Status -----

  - name: "data_ready returns True when not measuring"
    action: script
    script: |
      result = dev.data_ready()
    expect_true: true
    mode: [mock]

  - name: "All ready methods delegate to data_ready"
    action: script
    script: |
      result = dev.temperature_ready() and dev.pressure_ready() and dev.humidity_ready()
    expect_true: true
    mode: [mock]

  # ----- Compensated readings -----

  - name: "Temperature returns correct value from raw data"
    action: script
    script: |
      temp = dev.temperature()
      result = abs(temp - 25.08) < 0.1
    expect_true: true
    mode: [mock]

  - name: "Pressure returns correct value from raw data"
    action: script
    script: |
      press = dev.pressure_hpa()
      result = abs(press - 1009.21) < 0.5
    expect_true: true
    mode: [mock]

  - name: "Humidity returns correct value from raw data"
    action: script
    script: |
      hum = dev.humidity()
      result = abs(hum - 50.57) < 0.5
    expect_true: true
    mode: [mock]

  - name: "read() returns (temp, press, hum) tuple"
    action: script
    script: |
      t, p, h = dev.read()
      result = (
          abs(t - 25.08) < 0.1
          and abs(p - 1009.21) < 0.5
          and abs(h - 50.57) < 0.5
      )
    expect_true: true
    mode: [mock]

  - name: "Humidity valid when t_fine equals 76800"
    action: script
    script: |
      # Regression: _compensate_humidity() must not return 0 when t_fine - 76800 == 0
      dev.t_fine = 76800
      raw_hum = 28680
      hum_q22 = dev._compensate_humidity(raw_hum)
      result = hum_q22 > 0
    expect_true: true
    mode: [mock]

  - name: "t_fine updated after temperature read"
    action: script
    script: |
      dev.temperature()
      result = dev.t_fine == 128422
    expect_true: true
    mode: [mock]

  - name: "trigger_one_shot writes forced mode to ctrl_meas"
    action: script
    script: |
      i2c.clear_write_log()
      dev.trigger_one_shot()
      log = i2c.get_write_log()
      wrote_forced = any(
          reg == 0xF4 and (data[0] & 0x03) == 0x01
          for reg, data in log
      )
      result = wrote_forced
    expect_true: true
    mode: [mock]

  - name: "read_one_shot triggers and reads"
    action: script
    script: |
      i2c.clear_write_log()
      t, p, h = dev.read_one_shot()
      log = i2c.get_write_log()
      triggered = any(reg == 0xF4 for reg, data in log)
      result = triggered and abs(t - 25.08) < 0.1
    expect_true: true
    mode: [mock]

  # ----- Power and mode control -----

  - name: "power_off sets sleep mode"
    action: script
    script: |
      i2c.clear_write_log()
      dev.power_off()
      log = i2c.get_write_log()
      wrote_sleep = any(reg == 0xF4 and (data[0] & 0x03) == 0x00 for reg, data in log)
      result = wrote_sleep
    expect_true: true
    mode: [mock]

  - name: "power_on sets normal mode"
    action: script
    script: |
      i2c.clear_write_log()
      dev.power_on()
      log = i2c.get_write_log()
      wrote_normal = any(reg == 0xF4 and (data[0] & 0x03) == 0x03 for reg, data in log)
      result = wrote_normal
    expect_true: true
    mode: [mock]

  - name: "power_off preserves oversampling bits"
    action: script
    script: |
      from bme280.const import OSRS_X4, OSRS_T_SHIFT, OSRS_P_SHIFT
      dev.set_oversampling(temperature=OSRS_X4, pressure=OSRS_X4)
      i2c.clear_write_log()
      dev.power_off()
      log = i2c.get_write_log()
      ctrl = [data[0] for reg, data in log if reg == 0xF4][-1]
      osrs_t = (ctrl >> 5) & 0x07
      osrs_p = (ctrl >> 2) & 0x07
      result = osrs_t == OSRS_X4 and osrs_p == OSRS_X4 and (ctrl & 0x03) == 0x00
    expect_true: true
    mode: [mock]

  - name: "set_continuous enters normal mode"
    action: script
    script: |
      dev.power_off()
      i2c.clear_write_log()
      dev.set_continuous()
      log = i2c.get_write_log()
      wrote_normal = any(reg == 0xF4 and (data[0] & 0x03) == 0x03 for reg, data in log)
      result = wrote_normal
    expect_true: true
    mode: [mock]

  - name: "set_continuous with standby configures both"
    action: script
    script: |
      from bme280.const import STANDBY_500_MS, STANDBY_SHIFT
      i2c.clear_write_log()
      dev.set_continuous(standby=STANDBY_500_MS)
      log = i2c.get_write_log()
      wrote_config = any(reg == 0xF5 for reg, data in log)
      wrote_normal = any(reg == 0xF4 and (data[0] & 0x03) == 0x03 for reg, data in log)
      result = wrote_config and wrote_normal
    expect_true: true
    mode: [mock]

  # ----- Configuration -----

  - name: "set_oversampling configures temperature and pressure"
    action: script
    script: |
      from bme280.const import OSRS_X2, OSRS_X4, OSRS_T_SHIFT, OSRS_P_SHIFT
      i2c.clear_write_log()
      dev.set_oversampling(temperature=OSRS_X2, pressure=OSRS_X4)
      log = i2c.get_write_log()
      ctrl_writes = [data[0] for reg, data in log if reg == 0xF4]
      ctrl = ctrl_writes[-1]
      osrs_t = (ctrl >> OSRS_T_SHIFT) & 0x07
      osrs_p = (ctrl >> OSRS_P_SHIFT) & 0x07
      result = osrs_t == OSRS_X2 and osrs_p == OSRS_X4
    expect_true: true
    mode: [mock]

  - name: "set_oversampling configures humidity and latches via ctrl_meas"
    action: script
    script: |
      from bme280.const import OSRS_X8
      i2c.clear_write_log()
      dev.set_oversampling(humidity=OSRS_X8)
      log = i2c.get_write_log()
      hum_writes = [data[0] for reg, data in log if reg == 0xF2]
      # ctrl_meas must be rewritten after ctrl_hum for the change to take effect
      ctrl_writes = [data[0] for reg, data in log if reg == 0xF4]
      # Verify write order: ctrl_hum (0xF2) must come before ctrl_meas (0xF4)
      hum_idx = next(i for i, (reg, _) in enumerate(log) if reg == 0xF2)
      meas_idx = next(i for i, (reg, _) in enumerate(log) if reg == 0xF4)
      result = (
          len(hum_writes) == 1
          and hum_writes[0] == OSRS_X8
          and len(ctrl_writes) == 1
          and hum_idx < meas_idx
      )
    expect_true: true
    mode: [mock]

  - name: "set_iir_filter writes config register"
    action: script
    script: |
      from bme280.const import FILTER_16, FILTER_SHIFT
      i2c.clear_write_log()
      dev.set_iir_filter(FILTER_16)
      log = i2c.get_write_log()
      config_writes = [data[0] for reg, data in log if reg == 0xF5]
      result = len(config_writes) == 1 and ((config_writes[0] >> FILTER_SHIFT) & 0x07) == FILTER_16
    expect_true: true
    mode: [mock]

  - name: "set_standby writes config register"
    action: script
    script: |
      from bme280.const import STANDBY_250_MS, STANDBY_SHIFT
      i2c.clear_write_log()
      dev.set_standby(STANDBY_250_MS)
      log = i2c.get_write_log()
      config_writes = [data[0] for reg, data in log if reg == 0xF5]
      result = len(config_writes) == 1 and ((config_writes[0] >> STANDBY_SHIFT) & 0x07) == STANDBY_250_MS
    expect_true: true
    mode: [mock]

  - name: "set_iir_filter preserves standby bits"
    action: script
    script: |
      from bme280.const import STANDBY_500_MS, STANDBY_SHIFT, FILTER_4, FILTER_SHIFT
      dev.set_standby(STANDBY_500_MS)
      i2c.clear_write_log()
      dev.set_iir_filter(FILTER_4)
      log = i2c.get_write_log()
      config = [data[0] for reg, data in log if reg == 0xF5][-1]
      standby = (config >> STANDBY_SHIFT) & 0x07
      filt = (config >> FILTER_SHIFT) & 0x07
      result = standby == STANDBY_500_MS and filt == FILTER_4
    expect_true: true
    mode: [mock]

  # ----- Hardware tests -----

  - name: "Temperature in plausible range"
    action: script
    script: |
      t, _, _ = dev.read_one_shot()
      result = 10.0 <= t <= 45.0
    expect_true: true
    mode: [hardware]

  - name: "Pressure in plausible range"
    action: script
    script: |
      _, p, _ = dev.read_one_shot()
      result = 900.0 <= p <= 1100.0
    expect_true: true
    mode: [hardware]

  - name: "Humidity in plausible range"
    action: script
    script: |
      _, _, h = dev.read_one_shot()
      result = 5.0 <= h <= 95.0
    expect_true: true
    mode: [hardware]

  - name: "read_one_shot returns three plausible values"
    action: script
    script: |
      t, p, h = dev.read_one_shot()
      result = 10.0 <= t <= 45.0 and 900.0 <= p <= 1100.0 and 5.0 <= h <= 95.0
    expect_true: true
    mode: [hardware]

  - name: "Continuous mode produces plausible values"
    action: script
    script: |
      from time import sleep_ms
      dev.set_continuous()
      sleep_ms(100)
      t, p, h = dev.read()
      dev.power_off()
      result = 10.0 <= t <= 45.0 and 900.0 <= p <= 1100.0 and 5.0 <= h <= 95.0
    expect_true: true
    mode: [hardware]

  - name: "Readings feel correct"
    action: manual
    display:
      - method: read_one_shot
        label: "T, P, H"
    prompt: "Do the values look reasonable?"
    expect_true: true
    mode: [hardware]

  # ----- Auto-trigger (_ensure_data) -----

  - name: "_is_sleep_mode returns True after init"
    action: script
    script: |
      result = dev._is_sleep_mode()
    expect_true: true
    mode: [mock]

  - name: "_is_sleep_mode returns False in normal mode"
    action: script
    script: |
      dev.power_on()
      result = not dev._is_sleep_mode()
    expect_true: true
    mode: [mock]

  - name: "_ensure_data triggers forced mode in sleep"
    action: script
    script: |
      dev.power_off()
      i2c.clear_write_log()
      dev._ensure_data()
      log = i2c.get_write_log()
      triggered = any(reg == 0xF4 and (data[0] & 0x03) == 0x01 for reg, data in log)
      result = triggered
    expect_true: true
    mode: [mock]

  - name: "_ensure_data is no-op in normal mode"
    action: script
    script: |
      dev.power_on()
      i2c.clear_write_log()
      dev._ensure_data()
      log = i2c.get_write_log()
      # In normal mode, _ensure_data must not write to ctrl_meas (0xF4)
      wrote_forced = any(reg == 0xF4 and (data[0] & 0x03) == 0x01 for reg, data in log)
      result = not wrote_forced
    expect_true: true
    mode: [mock]

  - name: "temperature() auto-triggers in sleep mode"
    action: script
    script: |
      dev.power_off()
      i2c.clear_write_log()
      t = dev.temperature()
      log = i2c.get_write_log()
      triggered = any(reg == 0xF4 and (data[0] & 0x03) == 0x01 for reg, data in log)
      result = triggered and abs(t - 25.08) < 0.1
    expect_true: true
    mode: [mock]

  - name: "pressure_hpa() auto-triggers in sleep mode"
    action: script
    script: |
      dev.power_off()
      i2c.clear_write_log()
      p = dev.pressure_hpa()
      log = i2c.get_write_log()
      triggered = any(reg == 0xF4 and (data[0] & 0x03) == 0x01 for reg, data in log)
      result = triggered and abs(p - 1009.21) < 0.5
    expect_true: true
    mode: [mock]

  - name: "humidity() auto-triggers in sleep mode"
    action: script
    script: |
      dev.power_off()
      i2c.clear_write_log()
      h = dev.humidity()
      log = i2c.get_write_log()
      triggered = any(reg == 0xF4 and (data[0] & 0x03) == 0x01 for reg, data in log)
      result = triggered and abs(h - 50.57) < 0.5
    expect_true: true
    mode: [mock]

  - name: "read() auto-triggers in sleep mode"
    action: script
    script: |
      dev.power_off()
      i2c.clear_write_log()
      t, p, h = dev.read()
      log = i2c.get_write_log()
      triggered = any(reg == 0xF4 and (data[0] & 0x03) == 0x01 for reg, data in log)
      result = (
          triggered
          and abs(t - 25.08) < 0.1
          and abs(p - 1009.21) < 0.5
          and abs(h - 50.57) < 0.5
      )
    expect_true: true
    mode: [mock]

  - name: "read_one_shot does not double-trigger"
    action: script
    script: |
      dev.power_off()
      i2c.clear_write_log()
      t, p, h = dev.read_one_shot()
      log = i2c.get_write_log()
      # Should only trigger forced mode once (not twice via _ensure_data)
      forced_writes = [
          1 for reg, data in log if reg == 0xF4 and (data[0] & 0x03) == 0x01
      ]
      result = len(forced_writes) == 1 and abs(t - 25.08) < 0.1
    expect_true: true
    mode: [mock]

  # ----- Altitude -----

  - name: "Default sea_level_pressure is 1013.25"
    action: script
    script: |
      result = dev.sea_level_pressure == 1013.25
    expect_true: true
    mode: [mock]

  - name: "altitude() returns plausible value with default reference"
    action: script
    script: |
      alt = dev.altitude()
      # Mock pressure ~1009.21 hPa → altitude ~33.7 m at 1013.25 hPa reference
      result = abs(alt - 33.7) < 1.0
    expect_true: true
    mode: [mock]

  - name: "altitude() uses custom sea_level_pressure"
    action: script
    script: |
      dev.sea_level_pressure = 1020.0
      alt = dev.altitude()
      # Mock pressure ~1009.21 hPa → altitude ~89.6 m at 1020.0 hPa reference
      result = abs(alt - 89.6) < 1.0
      dev.sea_level_pressure = 1013.25
    expect_true: true
    mode: [mock]

  - name: "altitude() returns zero when pressure equals reference"
    action: script
    script: |
      # Set reference to match actual pressure so altitude should be ~0
      dev.sea_level_pressure = dev.pressure_hpa()
      alt = dev.altitude()
      result = abs(alt) < 0.5
      dev.sea_level_pressure = 1013.25
    expect_true: true
    mode: [mock]
