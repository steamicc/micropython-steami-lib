driver: daplink_flash
driver_class: DaplinkFlash
i2c_address: 0x3B

dependencies:
  - daplink_bridge

# Custom init: DaplinkFlash now takes a DaplinkBridge, not i2c
mock_init: |
  from daplink_bridge import DaplinkBridge
  bridge = DaplinkBridge(i2c, address=0x3B)
  dev = DaplinkFlash(bridge)

i2c:
  id: 1

# Hardware init: create bridge then flash
hardware_init: |
  from daplink_bridge import DaplinkBridge
  bridge = DaplinkBridge(i2c, address=0x3B)
  dev = DaplinkFlash(bridge)

mock_registers:
  # STATUS_REG (not busy)
  0x80: 0x00
  # ERROR_REG (no error)
  0x81: 0x00
  # GET_FILENAME (11 bytes: "TEST    CSV")
  0x04: [0x54, 0x45, 0x53, 0x54, 0x20, 0x20, 0x20, 0x20, 0x43, 0x53, 0x56]

tests:
  - name: "Get filename returns tuple"
    action: script
    script: |
      name, ext = dev.get_filename()
      result = name == "TEST" and ext == "CSV"
    expect_true: true
    mode: [mock]

  - name: "Set filename writes to register"
    action: script
    script: |
      _i2c = dev._bridge.i2c
      _i2c.clear_write_log()
      dev.set_filename("DATA", "CSV")
      log = _i2c.get_write_log()
      wrote_filename = any(reg == 0x03 for reg, data in log)
      result = wrote_filename
    expect_true: true
    mode: [mock]

  - name: "Clear flash sends command"
    action: script
    script: |
      _i2c = dev._bridge.i2c
      _i2c.clear_write_log()
      dev.clear_flash()
      log = _i2c.get_write_log()
      sent_clear = any(reg is None and 0x10 in data for reg, data in log)
      result = sent_clear
    expect_true: true
    mode: [mock]

  - name: "Write sends chunked data"
    action: script
    script: |
      _i2c = dev._bridge.i2c
      _i2c.clear_write_log()
      dev.write(b"Hello")
      log = _i2c.get_write_log()
      sent_write = any(reg is None and data[0] == 0x11 for reg, data in log)
      result = sent_write
    expect_true: true
    mode: [mock]

  - name: "Write returns byte count"
    action: script
    script: |
      n = dev.write(b"Test data")
      result = n == 9
    expect_true: true
    mode: [mock]

  - name: "Write string converts to bytes"
    action: script
    script: |
      n = dev.write("Hello")
      result = n == 5
    expect_true: true
    mode: [mock]

  - name: "Write line appends newline"
    action: script
    script: |
      n = dev.write_line("row")
      result = n == 4
    expect_true: true
    mode: [mock]

  - name: "Read sector sends command"
    action: script
    script: |
      _i2c = dev._bridge.i2c
      _i2c.clear_write_log()
      dev.read_sector(0)
      log = _i2c.get_write_log()
      sent_read = any(reg == 0x20 for reg, data in log)
      result = sent_read
    expect_true: true
    mode: [mock]

  # ----- Hardware -----

  - name: "Set and get filename round-trip"
    action: hardware_script
    script: |
      dev.set_filename("PYTEST", "TXT")
      name, ext = dev.get_filename()
      result = name == "PYTEST" and ext == "TXT"
    expect_true: true
    mode: [hardware]

  - name: "Write and clear flash"
    action: hardware_script
    script: |
      dev.set_filename("PYTEST", "TXT")
      dev.clear_flash()
      dev.write_line("test data")
      result = True
    expect_true: true
    mode: [hardware]

  - name: "Write and read back file content"
    action: hardware_script
    script: |
      from time import sleep_ms
      dev.set_filename("RDBACK", "TXT")
      dev.clear_flash()
      sleep_ms(500)
      dev.write_line("Hello Flash!")
      sleep_ms(100)
      content = dev.read()
      result = content == b"Hello Flash!\n"
    expect_true: true
    mode: [hardware]

  - name: "No data corruption at page boundaries"
    action: hardware_script
    script: |
      from time import sleep_ms
      dev.set_filename("PAGEBND", "TXT")
      dev.clear_flash()
      sleep_ms(500)
      for i in range(20):
          dev.write_line("ROW{:04d};AAAAAAAAAA".format(i))
      sleep_ms(100)
      content = dev.read()
      lines = content.decode().split("\n")
      lines = [l for l in lines if l]
      ok = len(lines) == 20
      for i, line in enumerate(lines):
          if line != "ROW{:04d};AAAAAAAAAA".format(i):
              ok = False
              break
      result = ok
    expect_true: true
    mode: [hardware]

  - name: "Multi-sector read returns all written data"
    action: hardware_script
    script: |
      from time import sleep_ms
      dev.set_filename("MULTI", "TXT")
      dev.clear_flash()
      sleep_ms(500)
      expected = ""
      for i in range(50):
          line = "LINE{:04d};DATA\n".format(i)
          dev.write(line)
          expected += line
      sleep_ms(100)
      content = dev.read()
      result = content.decode() == expected
    expect_true: true
    mode: [hardware]

  - name: "Read sector returns correct 256-byte block"
    action: hardware_script
    script: |
      from time import sleep_ms
      dev.set_filename("SECTOR", "TXT")
      dev.clear_flash()
      sleep_ms(500)
      data = "A" * 300 + "\n"
      dev.write(data)
      sleep_ms(100)
      s0 = dev.read_sector(0)
      s1 = dev.read_sector(1)
      result = len(s0) == 256 and len(s1) == 256
      result = result and s0[0] == ord("A") and s1[0] == ord("A")
    expect_true: true
    mode: [hardware]

  - name: "Erase then read returns empty"
    action: hardware_script
    script: |
      from time import sleep_ms
      dev.set_filename("ERASE", "TXT")
      dev.clear_flash()
      sleep_ms(500)
      dev.write_line("data to erase")
      sleep_ms(100)
      dev.clear_flash()
      sleep_ms(500)
      content = dev.read()
      result = len(content) == 0
    expect_true: true
    mode: [hardware]

  - name: "Config survives data file operations"
    action: hardware_script
    script: |
      from time import sleep_ms
      from daplink_bridge import DaplinkBridge
      bridge = DaplinkBridge(i2c, address=0x3B)
      bridge.clear_config()
      bridge.write_config('{"cal": true}')
      dev.set_filename("TEST", "CSV")
      dev.clear_flash()
      sleep_ms(500)
      dev.write_line("row1")
      sleep_ms(100)
      result = bridge.read_config() == b'{"cal": true}'
    expect_true: true
    mode: [hardware]
