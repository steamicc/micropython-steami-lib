driver: ssd1327
driver_class: WS_OLED_128X128_I2C
i2c_address: 0x3C

# I2C config for hardware tests (STeaMi board - STM32WB55)
# The display uses SPI on hardware, but i2c config is required by the bridge.
i2c:
  id: 1

# Custom hardware init (STeaMi display is on SPI, not I2C)
hardware_init: |
  from ssd1327.device import WS_OLED_128X128_SPI
  from machine import SPI, Pin
  spi = SPI(1)
  dc = Pin("DATA_COMMAND_DISPLAY")
  res = Pin("RST_DISPLAY")
  cs = Pin("CS_DISPLAY")
  dev = WS_OLED_128X128_SPI(spi, dc, res, cs)

tests:
  # ----- Mock: Smoke tests -----

  - name: "Fill black does not crash"
    action: call
    method: fill
    args: [0]
    mode: [mock]

  - name: "Fill white does not crash"
    action: call
    method: fill
    args: [15]
    mode: [mock]

  - name: "Text rendering does not crash"
    action: call
    method: text
    args: ["Test", 0, 0, 15]
    mode: [mock]

  - name: "Show does not crash"
    action: call
    method: show
    mode: [mock]

  # ----- Mock: Verify power_off sends correct commands -----

  - name: "Power off sends FN_SELECT_A disable and DISP off"
    action: script
    script: |
      i2c.clear_write_log()
      dev.power_off()
      log = i2c.get_write_log()
      cmds = [data[1] for reg, data in log if reg is None and len(data) == 2 and data[0] == 0x80]
      # Expect: SET_FN_SELECT_A (0xAB), 0x00 (disable VDD), SET_DISP (0xAE)
      result = cmds == [0xAB, 0x00, 0xAE]
    expect_true: true
    mode: [mock]

  # ----- Mock: Verify power_on sends correct commands -----

  - name: "Power on sends FN_SELECT_A enable and DISP on"
    action: script
    script: |
      i2c.clear_write_log()
      dev.power_on()
      log = i2c.get_write_log()
      cmds = [data[1] for reg, data in log if reg is None and len(data) == 2 and data[0] == 0x80]
      # Expect: SET_FN_SELECT_A (0xAB), 0x01 (enable VDD), SET_DISP|0x01 (0xAF)
      result = cmds == [0xAB, 0x01, 0xAF]
    expect_true: true
    mode: [mock]

  # ----- Mock: Verify contrast command -----

  - name: "Contrast sends SET_CONTRAST with value"
    action: script
    script: |
      i2c.clear_write_log()
      dev.contrast(200)
      log = i2c.get_write_log()
      cmds = [data[1] for reg, data in log if reg is None and len(data) == 2 and data[0] == 0x80]
      result = cmds == [0x81, 200]
    expect_true: true
    mode: [mock]

  # ----- Mock: Verify invert commands -----

  - name: "Invert on sends SET_DISP_MODE inverted"
    action: script
    script: |
      i2c.clear_write_log()
      dev.invert(True)
      log = i2c.get_write_log()
      cmds = [data[1] for reg, data in log if reg is None and len(data) == 2 and data[0] == 0x80]
      # SET_DISP_MODE (0xA4) | 0x03 = 0xA7 (inverted)
      result = cmds == [0xA7]
    expect_true: true
    mode: [mock]

  - name: "Invert off sends SET_DISP_MODE normal"
    action: script
    script: |
      i2c.clear_write_log()
      dev.invert(False)
      log = i2c.get_write_log()
      cmds = [data[1] for reg, data in log if reg is None and len(data) == 2 and data[0] == 0x80]
      # SET_DISP_MODE (0xA4) = normal
      result = cmds == [0xA4]
    expect_true: true
    mode: [mock]

  # ----- Mock: Verify rotate commands -----

  - name: "Rotate sends offset and remap commands"
    action: script
    script: |
      i2c.clear_write_log()
      dev.rotate(True)
      log = i2c.get_write_log()
      cmds = [data[1] for reg, data in log if reg is None and len(data) == 2 and data[0] == 0x80]
      # power_off + SET_DISP_OFFSET, 128, SET_SEG_REMAP, 0x42 + power_on
      expected = [0xAB, 0x00, 0xAE, 0xA2, 128, 0xA0, 0x42, 0xAB, 0x01, 0xAF]
      result = cmds == expected
    expect_true: true
    mode: [mock]

  # ----- Mock: Verify show sends column/row addr + data -----

  - name: "Show sends column and row address then data"
    action: script
    script: |
      i2c.clear_write_log()
      dev.show()
      log = i2c.get_write_log()
      cmds = [data[1] for reg, data in log if reg is None and len(data) == 2 and data[0] == 0x80]
      # SET_COL_ADDR (0x15), col_start, col_end, SET_ROW_ADDR (0x75), row_start, row_end
      expected_prefix = [0x15, 0x00, 0x3F, 0x75, 0x00, 0x7F]
      # Check data was sent (writevto with 0x40 prefix) with correct payload size
      data_writes = [data for reg, data in log if reg is None and len(data) > 2 and data[0] == 0x40]
      expected_payload = (dev.width * dev.height) // 2
      result = (
          cmds[:6] == expected_prefix
          and len(data_writes) > 0
          and len(data_writes[0]) - 1 == expected_payload
      )
    expect_true: true
    mode: [mock]

  # ----- Mock: Verify pixel buffer -----

  - name: "Pixel modifies framebuffer"
    action: script
    script: |
      dev.fill(0)
      dev.pixel(10, 20, 15)
      result = dev.framebuf.pixel(10, 20) == 15
    expect_true: true
    mode: [mock]

  - name: "Fill sets all pixels"
    action: script
    script: |
      dev.fill(7)
      result = (
          dev.framebuf.pixel(0, 0) == 7
          and dev.framebuf.pixel(63, 63) == 7
          and dev.framebuf.pixel(127, 0) == 7
          and dev.framebuf.pixel(0, 127) == 7
          and dev.framebuf.pixel(127, 127) == 7
      )
    expect_true: true
    mode: [mock]

  # ----- Mock: Verify init_display sends expected command sequence -----

  - name: "Init display sends unlock then display off then display on"
    action: script
    script: |
      i2c.clear_write_log()
      dev.init_display()
      log = i2c.get_write_log()
      cmds = [data[1] for reg, data in log if reg is None and len(data) == 2 and data[0] == 0x80]
      # First command must be SET_COMMAND_LOCK (0xFD), then unlock (0x12)
      # Then SET_DISP (0xAE = off), and last command must be SET_DISP|0x01 (0xAF = on)
      result = cmds[0] == 0xFD and cmds[1] == 0x12 and cmds[2] == 0xAE and cmds[-1] == 0xAF
    expect_true: true
    mode: [mock]

  # ----- Mock: Verify line draws on framebuffer -----

  - name: "Line modifies framebuffer"
    action: script
    script: |
      dev.fill(0)
      dev.line(0, 0, 10, 0, 15)
      # At least the start pixel should be set
      result = dev.framebuf.pixel(0, 0) == 15
    expect_true: true
    mode: [mock]

  # ----- Mock: Verify scroll moves framebuffer content -----

  - name: "Scroll shifts pixel position"
    action: script
    script: |
      dev.fill(0)
      dev.pixel(5, 0, 15)
      dev.scroll(1, 0)
      # Pixel should have moved from (5,0) to (6,0)
      moved = dev.framebuf.pixel(6, 0) == 15
      cleared = dev.framebuf.pixel(5, 0) == 0
      result = moved and cleared
    expect_true: true
    mode: [mock]

  # ----- Hardware -----

  - name: "Display white screen"
    action: hardware_script
    script: |
      dev.fill(15)
      dev.show()
      result = True
    expect_true: true
    mode: [hardware]

  - name: "Screen is white"
    action: manual
    prompt: "L'écran affiche-t-il un fond blanc uniforme ?"
    expect_true: true
    mode: [hardware]

  - name: "Display text"
    action: hardware_script
    script: |
      dev.fill(0)
      dev.text("STeaMi", 35, 56, 15)
      dev.text("Test OK", 32, 68, 15)
      dev.show()
      result = True
    expect_true: true
    mode: [hardware]

  - name: "Text is visible"
    action: manual
    prompt: "L'écran affiche-t-il 'STeaMi' et 'Test OK' sur fond noir ?"
    expect_true: true
    mode: [hardware]

  - name: "Display grayscale gradient"
    action: hardware_script
    script: |
      dev.fill(0)
      w = 128 // 16
      for level in range(16):
        x = level * w
        for row in range(128):
          for col in range(x, x + w):
            dev.pixel(col, row, level)
      dev.show()
      result = True
    expect_true: true
    mode: [hardware]

  - name: "Grayscale gradient is visible"
    action: manual
    prompt: "L'écran affiche-t-il 16 bandes verticales du noir au blanc ?"
    expect_true: true
    mode: [hardware]

  - name: "Scrolling animation"
    action: hardware_script
    script: |
      from time import sleep_ms
      dev.fill(0)
      dev.text("STeaMi", 35, 60, 15)
      dev.show()
      for i in range(128):
        dev.scroll(1, 0)
        dev.show()
        sleep_ms(20)
      result = True
    expect_true: true
    mode: [hardware]

  - name: "Animation was smooth"
    action: manual
    prompt: "Le texte 'STeaMi' a-t-il defile horizontalement de maniere fluide ?"
    expect_true: true
    mode: [hardware]
