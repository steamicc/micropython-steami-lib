driver: steami_config
driver_class: SteamiConfig
module_name: steami_config
i2c:
  id: 1
i2c_address: 0x3B
dependencies:
  - daplink_bridge
mock_init: |
  class FakeBridge(object):
      def __init__(self):
          self._data = b""
      def read_config(self):
          return self._data
      def write_config(self, data):
          if isinstance(data, str):
              data = data.encode()
          self._data = data
      def clear_config(self):
          self._data = b""
  dev = SteamiConfig(FakeBridge())
hardware_init: |
  from daplink_bridge import DaplinkBridge
  dev = SteamiConfig(DaplinkBridge(i2c))

tests:
  # ----- Mock -----

  - name: "Load empty config returns empty data"
    action: script
    script: |
      dev._bridge._data = b""
      dev.load()
      result = dev.board_revision is None and dev.board_name is None
    expect_true: true
    mode: [mock]

  - name: "Save and load round-trip"
    action: script
    script: |
      dev._data = {}
      dev.board_revision = 3
      dev.board_name = "STeaMi-01"
      dev.save()
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      result = dev2.board_revision == 3 and dev2.board_name == "STeaMi-01"
    expect_true: true
    mode: [mock]

  # -- Mock Temperature Calibration --
  - name: "Set and get temperature calibration"
    action: script
    script: |
      dev._data = {}
      dev.set_temperature_calibration("hts221", gain=1.02, offset=-0.5)
      cal = dev.get_temperature_calibration("hts221")
      result = cal["gain"] == 1.02 and cal["offset"] == -0.5
    expect_true: true
    mode: [mock]

  - name: "Get calibration returns None when not set"
    action: script
    script: |
      dev._data = {}
      result = dev.get_temperature_calibration("hts221") is None
    expect_true: true
    mode: [mock]

  - name: "Unknown sensor raises ValueError"
    action: script
    script: |
      try:
          dev.set_temperature_calibration("unknown_sensor", gain=1.0, offset=0.0)
          result = False
      except ValueError:
          result = True
    expect_true: true
    mode: [mock]

  - name: "All five sensors accepted"
    action: script
    script: |
      dev._data = {}
      sensors = ["hts221", "lis2mdl", "ism330dl", "wsen_hids", "wsen_pads"]
      for s in sensors:
          dev.set_temperature_calibration(s, gain=1.0, offset=0.0)
      result = len(dev._data.get("tc", {})) == 5
    expect_true: true
    mode: [mock]

  - name: "Apply calibration sets gain and offset"
    action: script
    script: |
      dev._data = {"tc": {"hts": {"g": 1.05, "o": -1.2}}}

      class FakeSensor(object):
          def __init__(self):
              self._temp_gain = 1.0
              self._temp_offset = 0.0

      class HTS221(FakeSensor):
          pass

      sensor = HTS221()
      dev.apply_temperature_calibration(sensor)
      result = sensor._temp_gain == 1.05 and sensor._temp_offset == -1.2
    expect_true: true
    mode: [mock]

  - name: "Apply calibration does nothing when not set"
    action: script
    script: |
      dev._data = {}

      class FakeSensor(object):
          def __init__(self):
              self._temp_gain = 1.0
              self._temp_offset = 0.0

      class HTS221(FakeSensor):
          pass

      sensor = HTS221()
      dev.apply_temperature_calibration(sensor)
      result = sensor._temp_gain == 1.0 and sensor._temp_offset == 0.0
    expect_true: true
    mode: [mock]

  # -- Mock Magnetometer Calibration --
  - name: "Set and get magnetometer calibration"
    action: script
    script: |
      dev._data = {}
      dev.set_magnetometer_calibration(
          hard_iron_x=12.3, hard_iron_y=-5.1, hard_iron_z=0.8,
          soft_iron_x=1.01, soft_iron_y=0.98, soft_iron_z=1.0,
      )
      cal = dev.get_magnetometer_calibration()
      result = (
          cal["hard_iron_x"] == 12.3
          and cal["hard_iron_y"] == -5.1
          and cal["hard_iron_z"] == 0.8
          and cal["soft_iron_x"] == 1.01
          and cal["soft_iron_y"] == 0.98
          and cal["soft_iron_z"] == 1.0
      )
    expect_true: true
    mode: [mock]

  - name: "Get magnetometer calibration returns None when not set"
    action: script
    script: |
      dev._data = {}
      result = dev.get_magnetometer_calibration() is None
    expect_true: true
    mode: [mock]

  - name: "Apply magnetometer calibration to LIS2MDL"
    action: script
    script: |
      dev._data = {"cm": {"hx": 10.0, "hy": -3.0, "hz": 1.5, "sx": 1.02, "sy": 0.99, "sz": 1.0}}

      class LIS2MDL(object):
          def __init__(self):
              self.x_off = 0
              self.y_off = 0
              self.z_off = 0
              self.x_scale = 1
              self.y_scale = 1
              self.z_scale = 1

      mag = LIS2MDL()
      dev.apply_magnetometer_calibration(mag)
      result = (
          mag.x_off == 10.0
          and mag.y_off == -3.0
          and mag.z_off == 1.5
          and mag.x_scale == 1.02
          and mag.y_scale == 0.99
          and mag.z_scale == 1.0
      )
    expect_true: true
    mode: [mock]

  - name: "Apply magnetometer calibration does nothing when not set"
    action: script
    script: |
      dev._data = {}

      class LIS2MDL(object):
          def __init__(self):
              self.x_off = 0
              self.y_off = 0
              self.z_off = 0
              self.x_scale = 1
              self.y_scale = 1
              self.z_scale = 1

      mag = LIS2MDL()
      dev.apply_magnetometer_calibration(mag)
      result = (
          mag.x_off == 0 and mag.y_off == 0 and mag.z_off == 0
          and mag.x_scale == 1 and mag.y_scale == 1 and mag.z_scale == 1
      )
    expect_true: true
    mode: [mock]

  - name: "Magnetometer calibration survives save/load"
    action: script
    script: |
      dev._data = {}
      dev.set_magnetometer_calibration(
          hard_iron_x=5.5, hard_iron_y=-2.2, hard_iron_z=0.3,
      )
      dev.save()
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      cal = dev2.get_magnetometer_calibration()
      result = (
          cal["hard_iron_x"] == 5.5
          and cal["hard_iron_y"] == -2.2
          and cal["hard_iron_z"] == 0.3
          and cal["soft_iron_x"] == 1.0
          and cal["soft_iron_y"] == 1.0
          and cal["soft_iron_z"] == 1.0
      )
    expect_true: true
    mode: [mock]

  - name: "Board revision property"
    action: script
    script: |
      dev._data = {}
      dev.board_revision = 5
      result = dev.board_revision == 5
    expect_true: true
    mode: [mock]

  - name: "Board name property"
    action: script
    script: |
      dev._data = {}
      dev.board_name = "Test-Board"
      result = dev.board_name == "Test-Board"
    expect_true: true
    mode: [mock]
  
  # -- Mock Accelerometer Calibration --
  - name: "Set and get accelerometer calibration"
    action: script
    script: |
      dev._data = {}
      dev.set_accelerometer_calibration(ox=0.01, oy=-0.02, oz=0.03)
      cal = dev.get_accelerometer_calibration()
      result = (
          cal["ox"] == 0.01
          and cal["oy"] == -0.02
          and cal["oz"] == 0.03
      )
    expect_true: true
    mode: [mock]

  - name: "Get accelerometer calibration returns None when not set"
    action: script
    script: |
      dev._data = {}
      result = dev.get_accelerometer_calibration() is None
    expect_true: true
    mode: [mock]

  - name: "Apply accelerometer calibration to ISM330DL"
    action: script
    script: |
      dev._data = {"ca": {"ox": 0.01, "oy": -0.02, "oz": 0.03}}

      class ISM330DL(object):
          def __init__(self):
              self._accel_offset_x = 0.0
              self._accel_offset_y = 0.0
              self._accel_offset_z = 0.0

          def set_accel_offset(self, ox=0.0, oy=0.0, oz=0.0):
              self._accel_offset_x = ox
              self._accel_offset_y = oy
              self._accel_offset_z = oz

      imu = ISM330DL()
      dev.apply_accelerometer_calibration(imu)
      result = (
          imu._accel_offset_x == 0.01
          and imu._accel_offset_y == -0.02
          and imu._accel_offset_z == 0.03
      )
    expect_true: true
    mode: [mock]

  - name: "Apply accelerometer calibration does nothing when not set"
    action: script
    script: |
      dev._data = {}

      class ISM330DL(object):
          def __init__(self):
              self._accel_offset_x = 0.0
              self._accel_offset_y = 0.0
              self._accel_offset_z = 0.0

          def set_accel_offset(self, ox=0.0, oy=0.0, oz=0.0):
              self._accel_offset_x = ox
              self._accel_offset_y = oy
              self._accel_offset_z = oz

      imu = ISM330DL()
      dev.apply_accelerometer_calibration(imu)
      result = (
          imu._accel_offset_x == 0.0
          and imu._accel_offset_y == 0.0
          and imu._accel_offset_z == 0.0
      )
    expect_true: true
    mode: [mock]

  - name: "Accelerometer calibration survives save/load"
    action: script
    script: |
      dev._data = {}
      dev.set_accelerometer_calibration(ox=0.01, oy=-0.02, oz=0.03)
      dev.save()
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      cal = dev2.get_accelerometer_calibration()
      result = (
          cal["ox"] == 0.01
          and cal["oy"] == -0.02
          and cal["oz"] == 0.03
      )
    expect_true: true
    mode: [mock]

  # -- Mock boot counter --
  - name: "Set and get boot counter"
    action: script
    script: |
      dev._data = {}
      dev.set_boot_count(427)
      result = dev.get_boot_count() == 427
    expect_true: true
    mode: [mock]

  - name: "Get boot counter returns None when not set"
    action: script
    script: |
      dev._data = {}
      result = dev.get_boot_count() is None
    expect_true: true
    mode: [mock]

  - name: "Increment boot counter from empty starts at 1"
    action: script
    script: |
      dev._data = {}
      dev.increment_boot_count()
      result = dev.get_boot_count() == 1
    expect_true: true
    mode: [mock]

  - name: "Increment boot counter increases existing value"
    action: script
    script: |
      dev._data = {}
      dev.set_boot_count(41)
      dev.increment_boot_count()
      result = dev.get_boot_count() == 42
    expect_true: true
    mode: [mock]

  - name: "Boot counter survives save/load"
    action: script
    script: |
      dev._data = {}
      dev.set_boot_count(427)
      dev.save()
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      result = dev2.get_boot_count() == 427
    expect_true: true
    mode: [mock]

  - name: "Boot counter coexists with other config values"
    action: script
    script: |
      dev._data = {}
      dev.board_revision = 3
      dev.board_name = "STeaMi-Test"
      dev.set_boot_count(12)
      dev.set_accelerometer_calibration(ox=0.01, oy=-0.02, oz=0.03)
      result = (
          dev.board_revision == 3
          and dev.board_name == "STeaMi-Test"
          and dev.get_boot_count() == 12
          and dev.get_accelerometer_calibration()["ox"] == 0.01
      )
    expect_true: true
    mode: [mock]

  # ----- Hardware -----

  - name: "Save and load config on hardware"
    action: script
    script: |
      dev._bridge.clear_config()
      dev._data = {}
      dev.board_revision = 3
      dev.board_name = "STeaMi-Test"
      dev.set_temperature_calibration("hts221", gain=1.02, offset=-0.5)
      dev.save()
      from time import sleep_ms
      sleep_ms(200)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      result = (
          dev2.board_revision == 3
          and dev2.board_name == "STeaMi-Test"
          and dev2.get_temperature_calibration("hts221")["gain"] == 1.02
      )
    expect_true: true
    mode: [hardware]

  - name: "Config survives clear_flash"
    action: script
    script: |
      from time import sleep_ms
      from daplink_flash import DaplinkFlash
      dev._bridge.clear_config()
      dev._data = {}
      dev.board_name = "Persist"
      dev.save()
      sleep_ms(200)
      flash = DaplinkFlash(dev._bridge)
      flash.clear_flash()
      sleep_ms(500)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      result = dev2.board_name == "Persist"
    expect_true: true
    mode: [hardware]

  # -- Hardware Temperature Calibration --
  - name: "Apply calibration to real sensor"
    action: script
    script: |
      from time import sleep_ms
      from wsen_hids import WSEN_HIDS
      from hts221 import HTS221
      hids = WSEN_HIDS(i2c)
      hts = HTS221(i2c)
      ref = hids.temperature()
      raw = hts.temperature()
      offset = ref - raw
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_temperature_calibration("hts221", gain=1.0, offset=offset)
      dev.save()
      sleep_ms(200)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      dev2.apply_temperature_calibration(hts)
      calibrated = hts.temperature()
      result = abs(calibrated - ref) < 1.0
    expect_true: true
    mode: [hardware]

  # -- Hardware Magnetometer Calibration --
  - name: "Save and load magnetometer calibration on hardware"
    action: script
    script: |
      from time import sleep_ms
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_magnetometer_calibration(
          hard_iron_x=12.3, hard_iron_y=-5.1, hard_iron_z=0.8,
          soft_iron_x=1.01, soft_iron_y=0.98, soft_iron_z=1.0,
      )
      dev.save()
      sleep_ms(200)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      cal = dev2.get_magnetometer_calibration()
      result = (
          cal["hard_iron_x"] == 12.3
          and cal["hard_iron_y"] == -5.1
          and cal["soft_iron_x"] == 1.01
      )
    expect_true: true
    mode: [hardware]

  - name: "Apply magnetometer calibration to real LIS2MDL"
    action: script
    script: |
      from time import sleep_ms
      from lis2mdl import LIS2MDL
      mag = LIS2MDL(i2c)
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_magnetometer_calibration(
          hard_iron_x=10.5, hard_iron_y=-3.2, hard_iron_z=0.7,
          soft_iron_x=1.02, soft_iron_y=0.99, soft_iron_z=1.0,
      )
      dev.save()
      sleep_ms(200)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      dev2.apply_magnetometer_calibration(mag)
      result = (
          mag.x_off == 10.5
          and mag.y_off == -3.2
          and mag.z_off == 0.7
          and mag.x_scale == 1.02
      )
    expect_true: true
    mode: [hardware]

  - name: "Magnetometer calibration coexists with temperature calibration"
    action: script
    script: |
      from time import sleep_ms
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_temperature_calibration("hts221", gain=1.05, offset=-0.3)
      dev.set_magnetometer_calibration(hard_iron_x=8.0, hard_iron_y=-2.0, hard_iron_z=0.5)
      dev.save()
      sleep_ms(200)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      tc = dev2.get_temperature_calibration("hts221")
      mc = dev2.get_magnetometer_calibration()
      result = (
          tc["gain"] == 1.05
          and tc["offset"] == -0.3
          and mc["hard_iron_x"] == 8.0
          and mc["soft_iron_x"] == 1.0
      )
    expect_true: true
    mode: [hardware]

  # -- Hardware Accelerometer Calibration --
  - name: "Save and load accelerometer calibration on hardware"
    action: script
    script: |
      from time import sleep_ms
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_accelerometer_calibration(ox=0.01, oy=-0.02, oz=0.03)
      dev.save()
      sleep_ms(200)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      cal = dev2.get_accelerometer_calibration()
      result = (
          cal["ox"] == 0.01
          and cal["oy"] == -0.02
          and cal["oz"] == 0.03
      )
    expect_true: true
    mode: [hardware]

  - name: "Apply accelerometer calibration to real ISM330DL"
    action: script
    script: |
      from time import sleep_ms
      from ism330dl import ISM330DL
      imu = ISM330DL(i2c)
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_accelerometer_calibration(ox=0.01, oy=-0.02, oz=0.03)
      dev.save()
      sleep_ms(200)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      dev2.apply_accelerometer_calibration(imu)
      ox, oy, oz = imu.get_accel_offset()
      result = ox == 0.01 and oy == -0.02 and oz == 0.03
    expect_true: true
    mode: [hardware]

  - name: "Accelerometer calibration coexists with temperature calibration"
    action: script
    script: |
      from time import sleep_ms
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_temperature_calibration("hts221", gain=1.05, offset=-0.3)
      dev.set_accelerometer_calibration(ox=0.01, oy=-0.02, oz=0.03)
      dev.save()
      sleep_ms(200)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      tc = dev2.get_temperature_calibration("hts221")
      ac = dev2.get_accelerometer_calibration()
      result = (
          tc["gain"] == 1.05
          and tc["offset"] == -0.3
          and ac["ox"] == 0.01
          and ac["oy"] == -0.02
          and ac["oz"] == 0.03
      )
    expect_true: true
    mode: [hardware]

    # -- Hardware Boot Counter --
  - name: "Save and load boot counter on hardware"
    action: script
    script: |
      from time import sleep_ms
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_boot_count(427)
      dev.save()
      sleep_ms(200)
      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      result = dev2.get_boot_count() == 427
    expect_true: true
    mode: [hardware]

  - name: "Increment boot counter on hardware"
    action: script
    script: |
      from time import sleep_ms
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_boot_count(5)
      dev.save()
      sleep_ms(200)

      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      dev2.increment_boot_count()
      dev2.save()
      sleep_ms(200)

      dev3 = SteamiConfig(dev._bridge)
      dev3.load()
      result = dev3.get_boot_count() == 6
    expect_true: true
    mode: [hardware]

  - name: "Boot counter survives clear_flash"
    action: script
    script: |
      from time import sleep_ms
      from daplink_flash import DaplinkFlash
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_boot_count(99)
      dev.save()
      sleep_ms(200)

      flash = DaplinkFlash(dev._bridge)
      flash.clear_flash()
      sleep_ms(500)

      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      result = dev2.get_boot_count() == 99
    expect_true: true
    mode: [hardware]

  - name: "Boot counter coexists with temperature calibration on hardware"
    action: script
    script: |
      from time import sleep_ms
      dev._bridge.clear_config()
      dev._data = {}
      dev.set_boot_count(12)
      dev.set_temperature_calibration("hts221", gain=1.05, offset=-0.3)
      dev.save()
      sleep_ms(200)

      dev2 = SteamiConfig(dev._bridge)
      dev2.load()
      tc = dev2.get_temperature_calibration("hts221")
      result = (
          dev2.get_boot_count() == 12
          and tc["gain"] == 1.05
          and tc["offset"] == -0.3
      )
    expect_true: true
    mode: [hardware]
