driver: vl53l1x
driver_class: VL53L1X
i2c_address: 0x29

# I2C config for hardware tests (STeaMi board - STM32WB55)
i2c:
  id: 1

# Register values for mock tests
# VL53L1X uses 16-bit register addresses
mock_registers:
  # MODEL_ID (0x010F-0x0110): expected 0xEACC
  0x010F: [0xEA, 0xCC]
  # SOFT_RESET (0x0000): sensor active
  0x0000: 0x01
  # MM_CONFIG__OUTER_OFFSET_MM (0x0022): used during init
  0x0022: [0x00, 0x00]
  # GPIO__TIO_HV_STATUS (0x0031): data ready (bit 0 = 1 when polarity=0)
  0x0031: 0x01
  # SYSTEM__INTERRUPT_CLEAR (0x0086)
  0x0086: 0x00
  # SYSTEM__MODE_START (0x0087)
  0x0087: 0x40
  # GPIO__HV_MUX__CTRL (0x0030): interrupt polarity (bit 4 = 0 -> active low)
  0x0030: 0x01
  # RESULT__RANGE_STATUS (0x0089): 17-byte result block
  # Bytes: range_status, report_status, stream_count,
  #         dss_spads(2), peak_rate(2), ambient_rate(2),
  #         sigma(2), phase(2), distance_mm(2), peak_corrected(2)
  # Simulated distance: 250 mm (0x00FA)
  0x0089: [0x09, 0x00, 0x01,
           0x00, 0x80, 0x01, 0x00,
           0x00, 0x10, 0x00, 0x20,
           0x00, 0x00, 0x00, 0xFA,
           0x01, 0x00]

tests:
  - name: "Verify model ID register"
    action: call
    method: read_model_id
    expect: 0xEACC
    mode: [mock, hardware]

  - name: "Read distance returns expected value"
    action: call
    method: read
    expect: 250
    mode: [mock]

  - name: "Data ready check works"
    action: script
    script: |
      result = dev._is_data_ready()
    expect_true: true
    mode: [mock]

  - name: "Read clears interrupt"
    action: script
    script: |
      i2c.clear_write_log()
      dev.read()
      log = i2c.get_write_log()
      cleared = any(reg == 0x0086 and data[0] == 0x01 for reg, data in log)
      result = cleared
    expect_true: true
    mode: [mock]

  - name: "Distance after stop and restart"
    action: script
    script: |
      dev.stop_ranging()
      d = dev.read()
      result = isinstance(d, int)
    expect_true: true
    mode: [mock]

  # ----- Hardware -----

  - name: "Distance in plausible range"
    action: call
    method: read
    expect_range: [0, 4000]
    mode: [hardware]

  - name: "Distance measurement feels correct"
    action: manual
    display:
      - method: read
        label: "Distance"
        unit: "mm"
    prompt: "La distance mesurée est-elle cohérente (objet devant le capteur) ?"
    expect_true: true
    mode: [hardware]
