    mode: [hardware]

  - name: "D-PAD RIGHT button (polling)"
    action: hardware_script
    pre_prompt: "Bouton RIGHT"
    wait: false
    script: |
      from machine import Pin
      from time import sleep_ms, ticks_ms, ticks_diff
      led = Pin("LED_GREEN", Pin.OUT)
      led.on()
