driver: mcp23009e
driver_class: MCP23009E
i2c_address: 0x20

# I2C config for hardware tests (STeaMi board - STM32WB55)
i2c:
  id: 1

# Extra constructor pins (FakePin instances for mock tests)
mock_pins:
  reset_pin: 0

# Custom hardware init (MCP23009E requires a reset pin)
hardware_init: |
  from machine import Pin
  dev = MCP23009E(i2c, address=0x20, reset_pin=Pin("RST_EXPANDER", Pin.OUT))

# Register values for mock tests
mock_registers:
  # IODIR (0x00): all inputs by default (0xFF)
  0x00: 0xFF
  # IPOL (0x01): no inversion
  0x01: 0x00
  # GPINTEN (0x02): interrupts disabled
  0x02: 0x00
  # DEFVAL (0x03): default
  0x03: 0x00
  # INTCON (0x04): default
  0x04: 0x00
  # IOCON (0x05): default config
  0x05: 0x00
  # GPPU (0x06): no pull-ups
  0x06: 0x00
  # INTF (0x07): no interrupt flags
  0x07: 0x00
  # INTCAP (0x08): default
  0x08: 0x00
  # GPIO (0x09): D-PAD buttons (bits 4-7 as inputs with pull-ups)
  0x09: 0xF0
  # OLAT (0x0A): default
  0x0A: 0x00

tests:
  - name: "Read IODIR default value"
    action: call
    method: get_iodir
    expect: 0xFF
    mode: [mock, hardware]

  - name: "Read GPIO register"
    action: call
    method: get_gpio
    expect_not_none: true
    mode: [mock, hardware]

  - name: "Power off holds reset pin low"
    action: script
    script: |
      dev.power_off()
      result = dev.reset_pin.value() == 0
    expect_true: true
    mode: [mock]

  - name: "Power on releases reset pin"
    action: script
    script: |
      dev.power_off()
      dev.power_on()
      result = dev.reset_pin.value() == 1
    expect_true: true
    mode: [mock]

  - name: "Read individual GPIO level"
    action: call
    method: get_level
    args: [0]
    expect_not_none: true
    mode: [mock]

  - name: "D-PAD buttons state"
    action: manual
    display:
      - method: get_level
        args: [7]
        label: "UP (GP7)"
        unit: "(1=relâché, 0=appuyé)"
      - method: get_level
        args: [5]
        label: "DOWN (GP5)"
        unit: "(1=relâché, 0=appuyé)"
      - method: get_level
        args: [6]
        label: "LEFT (GP6)"
        unit: "(1=relâché, 0=appuyé)"
      - method: get_level
        args: [4]
        label: "RIGHT (GP4)"
        unit: "(1=relâché, 0=appuyé)"
    prompt: "Tous les boutons sont-ils relâchés (valeur 1) ?"
    expect_true: true
    mode: [hardware]

  - name: "Set IODIR register"
    action: script
    script: |
      dev.set_iodir(0xF0)
      result = dev.get_iodir() == 0xF0
    expect_true: true
    mode: [mock]

  - name: "Set and read full GPIO port"
    action: script
    script: |
      dev.set_iodir(0x00)
      dev.set_gpio(0x5A)
      result = dev.get_gpio() == 0x5A
    expect_true: true
    mode: [mock]

  - name: "Setup configures pin as input with pull-up"
    action: script
    script: |
      dev.set_iodir(0x00)
      dev.set_gppu(0x00)
      dev.set_ipol(0x00)
      dev.setup(2, 1, pullup=1, polarity=0)
      result = (
        dev.get_iodir() == 0x04 and
        dev.get_gppu() == 0x04 and
        dev.get_ipol() == 0x00
      )
    expect_true: true
    mode: [mock]

  - name: "Setup configures pin as output without pull-up"
    action: script
    script: |
      dev.set_iodir(0xFF)
      dev.set_gppu(0xFF)
      dev.set_ipol(0x00)
      dev.setup(3, 0, pullup=0, polarity=0)
      result = (
        dev.get_iodir() == 0xF7 and
        dev.get_gppu() == 0xF7 and
        dev.get_ipol() == 0x00
      )
    expect_true: true
    mode: [mock]

  - name: "Setup configures polarity inversion"
    action: script
    script: |
      dev.set_iodir(0x00)
      dev.set_gppu(0x00)
      dev.set_ipol(0x00)
      dev.setup(1, 1, pullup=1, polarity=1)
      result = (
        dev.get_iodir() == 0x02 and
        dev.get_gppu() == 0x02 and
        dev.get_ipol() == 0x02
      )
    expect_true: true
    mode: [mock]

  - name: "Set and get individual output level high"
    action: script
    script: |
      dev.set_iodir(0xFE)
      dev.set_gpio(0x00)
      dev.set_level(0, 1)
      result = dev.get_level(0) == 1 and dev.get_gpio() == 0x01
    expect_true: true
    mode: [mock]

  - name: "Set and get individual output level low"
    action: script
    script: |
      dev.set_iodir(0xFE)
      dev.set_gpio(0x01)
      dev.set_level(0, 0)
      result = dev.get_level(0) == 0 and dev.get_gpio() == 0x00
    expect_true: true
    mode: [mock]

  - name: "Set level does not modify input pin"
    action: script
    script: |
      dev.set_iodir(0xFF)
      dev.set_gpio(0xF0)
      dev.set_level(4, 0)
      result = dev.get_gpio() == 0xF0 and dev.get_level(4) == 1
    expect_true: true
    mode: [mock]

  - name: "Get GPPU register after write"
    action: script
    script: |
      dev.set_gppu(0xA5)
      result = dev.get_gppu() == 0xA5
    expect_true: true
    mode: [mock]

  - name: "Power cycle toggles reset pin"
    action: script
    script: |
      dev.power_off()
      off_state = dev.reset_pin.value()
      dev.power_on()
      on_state = dev.reset_pin.value()
      result = off_state == 0 and on_state == 1
    expect_true: true
    mode: [mock]

  # --- Polling tests (one per D-PAD button) ---
  # LED_GREEN signals when the board is ready to read the button.

  - name: "D-PAD UP button (polling)"
    action: hardware_script
    pre_prompt: "Test polling D-PAD : appuyez sur chaque bouton quand la LED verte s'allume (5s). Commençons par UP."
    script: |
      from machine import Pin
      from time import sleep_ms, ticks_ms, ticks_diff
      led = Pin("LED_GREEN", Pin.OUT)
      led.on()
      start = ticks_ms()
      detected = False
      while ticks_diff(ticks_ms(), start) < 5000:
        if dev.get_level(7) == 0:
          detected = True
          break
        sleep_ms(50)
      led.off()
      result = detected
    expect_true: true
    mode: [hardware]

  - name: "D-PAD DOWN button (polling)"
    action: hardware_script
    pre_prompt: "Bouton DOWN"
    wait: false
    script: |
      from machine import Pin
      from time import sleep_ms, ticks_ms, ticks_diff
      led = Pin("LED_GREEN", Pin.OUT)
      led.on()
      start = ticks_ms()
      detected = False
      while ticks_diff(ticks_ms(), start) < 5000:
        if dev.get_level(5) == 0:
          detected = True
          break
        sleep_ms(50)
      led.off()
      result = detected
    expect_true: true
    mode: [hardware]

  - name: "D-PAD LEFT button (polling)"
    action: hardware_script
    pre_prompt: "Bouton LEFT"
