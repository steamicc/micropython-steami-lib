type: board
name: "Temperature comparison (all sensors)"

i2c:
  id: 1

# List of drivers needed — triggers mounting lib/ via mpremote
drivers:
  - hts221
  - wsen-hids
  - wsen-pads
  - lis2mdl
  - ism330dl

tests:
  - name: "Read all temperature sensors"
    action: hardware_script
    script: |
      import sys
      sys.path.insert(0, '/remote/hts221')
      sys.path.insert(0, '/remote/wsen-hids')
      sys.path.insert(0, '/remote/wsen-pads')
      sys.path.insert(0, '/remote/lis2mdl')
      sys.path.insert(0, '/remote/ism330dl')

      from machine import I2C
      from time import sleep_ms

      i2c = I2C(1)

      temps = {}

      # HTS221
      from hts221.device import HTS221
      hts = HTS221(i2c)
      hts.power_off()
      sleep_ms(20)
      hts.power_on()
      sleep_ms(50)
      temps['HTS221'] = hts.temperature()

      # WSEN-HIDS
      from wsen_hids.device import WSEN_HIDS
      hids = WSEN_HIDS(i2c)
      temps['WSEN-HIDS'] = hids.temperature()

      # WSEN-PADS
      from wsen_pads.device import WSEN_PADS
      pads = WSEN_PADS(i2c)
      temps['WSEN-PADS'] = pads.temperature()

      # LIS2MDL (auxiliary, offset not guaranteed by datasheet)
      from lis2mdl.device import LIS2MDL
      mag = LIS2MDL(i2c)
      temps['LIS2MDL'] = mag.read_temperature_c()

      # ISM330DL (auxiliary, offset not guaranteed by datasheet)
      from ism330dl.device import ISM330DL
      imu = ISM330DL(i2c)
      sleep_ms(200)  # stabilize after reset
      temps['ISM330DL'] = imu.temperature_c()

      # Print comparison table
      print('--- Temperature Comparison ---')
      for name, t in temps.items():
        pad = ' ' * (12 - len(name))
        print('  ' + name + pad + ': ' + str(round(t, 2)) + ' C')

      # Check thermometers in plausible range (HTS221, WSEN-HIDS, WSEN-PADS)
      thermometers = [temps['HTS221'], temps['WSEN-HIDS'], temps['WSEN-PADS']]
      all_ok = all(5.0 <= t <= 50.0 for t in thermometers)

      # Check spread between thermometers
      spread = max(thermometers) - min(thermometers)
      print('  Spread: ' + str(round(spread, 2)) + ' C')

      result = all_ok and spread < 8.0
    expect_true: true
    mode: [hardware]

  - name: "Temperature spread with barometer"
    action: hardware_script
    script: |
      import sys
      sys.path.insert(0, '/remote/hts221')
      sys.path.insert(0, '/remote/wsen-pads')

      from machine import I2C
      from time import sleep_ms

      i2c = I2C(1)

      from hts221.device import HTS221
      hts = HTS221(i2c)
      hts.power_off()
      sleep_ms(20)
      hts.power_on()
      sleep_ms(50)
      t_hts = hts.temperature()

      from wsen_pads.device import WSEN_PADS
      pads = WSEN_PADS(i2c)
      t_pads = pads.temperature()

      spread = abs(t_hts - t_pads)
      print('  HTS221: ' + str(round(t_hts, 2)) + ' C  |  WSEN-PADS: ' + str(round(t_pads, 2)) + ' C  |  Spread: ' + str(round(spread, 2)) + ' C')
      result = spread < 5.0
    expect_true: true
    mode: [hardware]

  - name: "Offset-align all sensors to WSEN-HIDS reference"
    action: hardware_script
    script: |
      import sys
      sys.path.insert(0, '/remote/hts221')
      sys.path.insert(0, '/remote/wsen-hids')
      sys.path.insert(0, '/remote/wsen-pads')
      sys.path.insert(0, '/remote/lis2mdl')
      sys.path.insert(0, '/remote/ism330dl')

      from machine import I2C
      from time import sleep_ms

      i2c = I2C(1)

      # Initialize all sensors
      from wsen_hids.device import WSEN_HIDS
      ref = WSEN_HIDS(i2c)

      from hts221.device import HTS221
      hts = HTS221(i2c)
      hts.power_off()
      sleep_ms(20)
      hts.power_on()
      sleep_ms(50)

      from wsen_pads.device import WSEN_PADS
      pads = WSEN_PADS(i2c)

      from lis2mdl.device import LIS2MDL
      mag = LIS2MDL(i2c)

      from ism330dl.device import ISM330DL
      imu = ISM330DL(i2c)
      sleep_ms(200)  # stabilize after reset

      # Read reference just before each sensor to minimize drift
      ref_t = ref.temperature()
      hts_t = hts.temperature()

      ref_t2 = ref.temperature()
      pads_t = pads.temperature()

      ref_t3 = ref.temperature()
      mag_t = mag.read_temperature_c()

      ref_t4 = ref.temperature()
      imu_t = imu.temperature_c()

      print('--- Before offset alignment ---')
      print('  WSEN-HIDS (ref): ' + str(round(ref_t, 2)) + ' C')
      print('  HTS221:          ' + str(round(hts_t, 2)) + ' C')
      print('  WSEN-PADS:       ' + str(round(pads_t, 2)) + ' C')
      print('  LIS2MDL:         ' + str(round(mag_t, 2)) + ' C')
      print('  ISM330DL:        ' + str(round(imu_t, 2)) + ' C')

      spread_before = max(hts_t, pads_t, mag_t, imu_t, ref_t) - min(hts_t, pads_t, mag_t, imu_t, ref_t)
      print('  Spread: ' + str(round(spread_before, 2)) + ' C')

      # Apply offset to align each sensor to the reference reading
      hts.set_temp_offset(ref_t - hts_t)
      pads.set_temp_offset(ref_t2 - pads_t)
      mag.set_temp_offset(ref_t3 - mag_t)
      imu.set_temp_offset(ref_t4 - imu_t)

      # Re-read after offset alignment
      sleep_ms(50)
      ref_t5 = ref.temperature()
      hts_t2 = hts.temperature()
      pads_t2 = pads.temperature()
      mag_t2 = mag.read_temperature_c()
      imu_t2 = imu.temperature_c()

      print('--- After offset alignment ---')
      print('  WSEN-HIDS (ref): ' + str(round(ref_t5, 2)) + ' C')
      print('  HTS221:          ' + str(round(hts_t2, 2)) + ' C')
      print('  WSEN-PADS:       ' + str(round(pads_t2, 2)) + ' C')
      print('  LIS2MDL:         ' + str(round(mag_t2, 2)) + ' C')
      print('  ISM330DL:        ' + str(round(imu_t2, 2)) + ' C')

      spread_after = max(hts_t2, pads_t2, mag_t2, imu_t2, ref_t5) - min(hts_t2, pads_t2, mag_t2, imu_t2, ref_t5)
      print('  Spread: ' + str(round(spread_after, 2)) + ' C')

      # After alignment, spread should be < 2°C
      result = spread_after < 2.0
    expect_true: true
    mode: [hardware]

  - name: "Temperature values feel correct"
    action: manual
    prompt: "Les températures lues sont-elles cohérentes entre elles et avec l'ambiance ?"
    expect_true: true
    mode: [hardware]
