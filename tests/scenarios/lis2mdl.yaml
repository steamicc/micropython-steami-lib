driver: lis2mdl
driver_class: LIS2MDL
i2c_address: 0x1E

# I2C config for hardware tests (STeaMi board - STM32WB55)
i2c:
  id: 1

# Register values for mock tests
# These simulate a real LIS2MDL magnetometer
mock_registers:
  # WHO_AM_I (expected 0x40)
  0x4F: 0x40
  # CFG_REG_A (continuous mode, 10Hz, temp comp on)
  0x60: 0x80
  # CFG_REG_B (default)
  0x61: 0x00
  # CFG_REG_C (BDU enabled)
  0x62: 0x10
  # STATUS_REG (new data ready on all axes)
  0x67: 0x0F
  # OUTX_L..OUTZ_H (simulated magnetic field ~300, -150, 450 LSB)
  # Multi-byte read at 0xE8 (0x68 | 0x80), 6 bytes block
  0xE8: [0x2C, 0x01, 0x6A, 0xFF, 0xC2, 0x01]
  # TEMP_OUT (simulated ~25°C: offset=25, raw=0 → 25+0/8=25°C)
  0x6E: 0x00  # TEMP_OUT_L
  0x6F: 0x00  # TEMP_OUT_H
  # Offset registers (all zero)
  0x45: 0x00
  0x46: 0x00
  0x47: 0x00
  0x48: 0x00
  0x49: 0x00
  0x4A: 0x00

tests:
  - name: "Verify WHO_AM_I register"
    action: read_register
    register: 0x4F
    expect: 0x40
    mode: [mock, hardware]

  - name: "Read WHO_AM_I via method"
    action: call
    method: read_who_am_i
    expect: 0x40
    mode: [mock, hardware]

  - name: "Read status register"
    action: call
    method: read_status
    expect_not_none: true
    mode: [mock, hardware]

  - name: "Read magnetic field returns tuple"
    action: call
    method: read_magnet
    expect_not_none: true
    mode: [mock]

  - name: "Read magnetic field in uT returns tuple"
    action: call
    method: read_magnet_uT
    expect_not_none: true
    mode: [mock]

  - name: "Read temperature returns float"
    action: call
    method: read_temperature_c
    expect: 25.0
    mode: [mock]

  - name: "Temperature with offset"
    action: script
    script: |
      dev.set_temp_offset(-2.0)
      result = dev.read_temperature_c()
    expect_range: [22.0, 24.0]
    mode: [mock]

  - name: "Temperature with two-point calibration"
    action: script
    script: |
      dev.calibrate_temperature(20.0, 25.0, 30.0, 35.0)
      result = dev.read_temperature_c()
    expect_range: [19.0, 21.0]
    mode: [mock]

  # ----- Auto-trigger -----

  - name: "Magnetic field readable after power down"
    action: script
    script: |
      dev.power_down()
      x, y, z = dev.read_magnet()
      result = isinstance(x, int) and isinstance(y, int) and isinstance(z, int)
    expect_true: true
    mode: [mock]

  - name: "Temperature readable after power down"
    action: script
    script: |
      dev.power_down()
      t = dev.read_temperature_c()
      result = isinstance(t, float)
    expect_true: true
    mode: [mock]

  - name: "Auto-trigger writes single mode to CFG_REG_A"
    action: script
    script: |
      dev.power_down()
      i2c.clear_write_log()
      dev.read_magnet()
      log = i2c.get_write_log()
      wrote_cfg_a = any(reg == 0x60 for reg, data in log)
      result = wrote_cfg_a
    expect_true: true
    mode: [mock]

  - name: "No auto-trigger when already active"
    action: script
    script: |
      dev.read_magnet()
      i2c.clear_write_log()
      dev.read_magnet()
      log = i2c.get_write_log()
      result = len(log) == 0
    expect_true: true
    mode: [mock]

  - name: "Fresh magnitude after power down"
    action: script
    script: |
      dev.power_down()
      mag = dev.magnitude_uT()
      result = 10.0 < mag < 300.0
    expect_true: true
    mode: [hardware]

  - name: "Fresh temperature after power down"
    action: script
    script: |
      dev.power_down()
      t = dev.read_temperature_c()
      result = 10.0 < t < 45.0
    expect_true: true
    mode: [hardware]

  # ----- Hardware -----

  - name: "Magnitude in plausible range"
    action: call
    method: magnitude_uT
    expect_range: [10.0, 300.0]
    mode: [hardware]

  - name: "Temperature in plausible range"
    action: call
    method: read_temperature_c
    expect_range: [10.0, 45.0]
    mode: [hardware]

  - name: "Soft reset then WHO_AM_I"
    action: hardware_script
    script: |
      dev.soft_reset()
      result = dev.read_who_am_i()
    expect: 0x40
    mode: [hardware]

  - name: "Reboot then WHO_AM_I"
    action: hardware_script
    script: |
      dev.reboot()
      result = dev.read_who_am_i()
    expect: 0x40
    mode: [hardware]

  - name: "Magnetic field values feel correct"
    action: manual
    display:
      - method: magnitude_uT
        label: "Magnitude"
        unit: "µT"
      - method: read_temperature_c
        label: "Temperature"
        unit: "°C"
      - method: heading_flat_only
        label: "Heading"
        unit: "°"
    prompt: "Ces valeurs sont-elles cohérentes (magnitude ~25-65µT, cap 0-360°) ?"
    expect_true: true
    mode: [hardware]
