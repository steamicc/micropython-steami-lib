driver: apds9960
driver_class: uAPDS9960
i2c_address: 0x39

# I2C config for hardware tests (STeaMi board - STM32WB55)
i2c:
  id: 1

# Custom hardware init (enable light and proximity sensors before reading)
hardware_init: |
  from time import sleep
  dev = uAPDS9960(i2c)
  dev.enable_light_sensor(False)
  dev.enable_proximity_sensor(False)
  sleep(0.3)

# Register values for mock tests
mock_registers:
  # ID register (0x92): expected 0xAB
  0x92: 0xAB
  # ENABLE (0x80): power off at start
  0x80: 0x00
  # CONTROL (0x8F): used by read-modify-write in init
  0x8F: 0x00
  # CONFIG2 (0x90): default
  0x90: 0x01
  # CONFIG3 (0x9F): default
  0x9F: 0x00
  # GCONF2 (0xA3): used by gesture config
  0xA3: 0x00
  # GCONF4 (0xAB): used by gesture config
  0xAB: 0x00
  # STATUS (0x93): AVALID + PVALID
  0x93: 0x03
  # Ambient light: clear channel = 256 (0x0100)
  0x94: 0x00  # CDATAL
  0x95: 0x01  # CDATAH
  # Red = 128
  0x96: 0x80  # RDATAL
  0x97: 0x00  # RDATAH
  # Green = 64
  0x98: 0x40  # GDATAL
  0x99: 0x00  # GDATAH
  # Blue = 32
  0x9A: 0x20  # BDATAL
  0x9B: 0x00  # BDATAH
  # Proximity = 80
  0x9C: 0x50

tests:
  - name: "Verify device ID register (mock)"
    action: call
    method: _read_reg
    args: [0x92]
    expect: 0xAB
    mode: [mock]

  - name: "Read device ID via method"
    action: call
    method: device_id
    expect: 0xAB
    mode: [mock]

  - name: "Verify device ID register (hardware)"
    action: read_register
    register: 0x92
    expect: 0xAB
    mode: [hardware]

  - name: "Read ambient light returns expected value"
    action: call
    method: ambient_light
    expect: 256
    mode: [mock]

  - name: "Read proximity returns expected value"
    action: call
    method: proximity
    expect: 80
    mode: [mock]

  - name: "Read red light returns expected value"
    action: call
    method: red_light
    expect: 128
    mode: [mock]

  # ----- Auto-enable -----

  - name: "Auto-enable writes ENABLE register for light"
    action: script
    script: |
      dev.disable_light_sensor()
      i2c.clear_write_log()
      dev.ambient_light()
      log = i2c.get_write_log()
      wrote_enable = any(reg == 0x80 for reg, data in log)
      enable_val = dev.get_mode()
      has_pon = bool(enable_val & 0x01)
      has_aen = bool(enable_val & 0x02)
      result = wrote_enable and has_pon and has_aen
    expect_true: true
    mode: [mock]

  - name: "Auto-enable writes ENABLE register for proximity"
    action: script
    script: |
      dev.disable_proximity_sensor()
      i2c.clear_write_log()
      dev.proximity()
      log = i2c.get_write_log()
      wrote_enable = any(reg == 0x80 for reg, data in log)
      enable_val = dev.get_mode()
      has_pon = bool(enable_val & 0x01)
      has_pen = bool(enable_val & 0x04)
      result = wrote_enable and has_pon and has_pen
    expect_true: true
    mode: [mock]

  - name: "Auto-enable restores power for light read"
    action: script
    script: |
      dev.power_off()
      i2c.clear_write_log()
      dev.red_light()
      log = i2c.get_write_log()
      wrote_enable = any(reg == 0x80 for reg, data in log)
      enable_val = dev.get_mode()
      has_pon = bool(enable_val & 0x01)
      has_aen = bool(enable_val & 0x02)
      result = wrote_enable and has_pon and has_aen
    expect_true: true
    mode: [mock]

  - name: "No re-enable when already active"
    action: script
    script: |
      dev.enable_light_sensor(False)
      i2c.clear_write_log()
      dev.ambient_light()
      log = i2c.get_write_log()
      result = len(log) == 0
    expect_true: true
    mode: [mock]

  # ----- Getter/Setter round-trips -----

  - name: "Proximity gain round-trip"
    action: script
    script: |
      dev.set_proximity_gain(2)
      result = dev.get_proximity_gain() == 2
    expect_true: true
    mode: [mock]

  - name: "Ambient light gain round-trip"
    action: script
    script: |
      dev.set_ambient_light_gain(2)
      result = dev.get_ambient_light_gain() == 2
    expect_true: true
    mode: [mock]

  - name: "LED drive round-trip"
    action: script
    script: |
      dev.set_led_drive(1)
      result = dev.get_led_drive() == 1
    expect_true: true
    mode: [mock]

  - name: "LED boost round-trip"
    action: script
    script: |
      dev.set_led_boost(2)
      result = dev.get_led_boost() == 2
    expect_true: true
    mode: [mock]

  - name: "Proximity int low threshold round-trip"
    action: script
    script: |
      dev.set_prox_int_low_thresh(50)
      result = dev.get_prox_int_low_thresh() == 50
    expect_true: true
    mode: [mock]

  - name: "Proximity int high threshold round-trip"
    action: script
    script: |
      dev.set_prox_int_high_thresh(200)
      result = dev.get_prox_int_high_thresh() == 200
    expect_true: true
    mode: [mock]

  - name: "Gesture gain round-trip"
    action: script
    script: |
      dev.set_gesture_gain(2)
      result = dev.get_gesture_gain() == 2
    expect_true: true
    mode: [mock]

  - name: "Gesture LED drive round-trip"
    action: script
    script: |
      dev.set_gesture_led_drive(1)
      result = dev.get_gesture_led_drive() == 1
    expect_true: true
    mode: [mock]

  - name: "Gesture enter threshold round-trip"
    action: script
    script: |
      dev.set_gesture_enter_thresh(30)
      result = dev.get_gesture_enter_thresh() == 30
    expect_true: true
    mode: [mock]

  - name: "Gesture exit threshold round-trip"
    action: script
    script: |
      dev.set_gesture_exit_thresh(20)
      result = dev.get_gesture_exit_thresh() == 20
    expect_true: true
    mode: [mock]

  # ----- Gesture sensor enable/disable -----

  - name: "Enable gesture sensor sets GEN bit"
    action: script
    script: |
      dev.enable_gesture_sensor(False)
      mode = dev.get_mode()
      has_gen = bool(mode & 0x40)
      has_pon = bool(mode & 0x01)
      result = has_gen and has_pon
    expect_true: true
    mode: [mock]

  - name: "Disable gesture sensor clears GEN bit"
    action: script
    script: |
      dev.enable_gesture_sensor(False)
      dev.disable_gesture_sensor()
      mode = dev.get_mode()
      has_gen = bool(mode & 0x40)
      result = not has_gen
    expect_true: true
    mode: [mock]

  - name: "is_gesture_available returns bool"
    action: script
    script: |
      result = isinstance(dev.is_gesture_available(), bool)
    expect_true: true
    mode: [mock]

  # ----- Power on/off -----

  - name: "Power off clears PON bit"
    action: script
    script: |
      dev.power_on()
      dev.power_off()
      mode = dev.get_mode()
      result = not bool(mode & 0x01)
    expect_true: true
    mode: [mock]

  - name: "Power on sets PON bit"
    action: script
    script: |
      dev.power_off()
      dev.power_on()
      mode = dev.get_mode()
      result = bool(mode & 0x01)
    expect_true: true
    mode: [mock]

  # ----- Additional setter/getter round-trips -----

  - name: "Gesture wait time round-trip"
    action: script
    script: |
      dev.set_gesture_wait_time(3)
      result = dev.get_gesture_wait_time() == 3
    expect_true: true
    mode: [mock]

  - name: "Light int low threshold round-trip"
    action: script
    script: |
      dev.set_light_int_low_threshold(100)
      result = dev.get_light_int_low_threshold() == 100
    expect_true: true
    mode: [mock]

  - name: "Light int high threshold round-trip"
    action: script
    script: |
      dev.set_light_int_high_threshold(5000)
      result = dev.get_light_int_high_threshold() == 5000
    expect_true: true
    mode: [mock]

  - name: "Gesture mode round-trip"
    action: script
    script: |
      dev.set_gesture_mode(True)
      result = dev.get_gesture_mode() == True
    expect_true: true
    mode: [mock]

  - name: "Proximity int enable round-trip"
    action: script
    script: |
      dev.set_proximity_int_enable(True)
      result = dev.get_proximity_int_enable() == True
    expect_true: true
    mode: [mock]

  - name: "Ambient light int enable round-trip"
    action: script
    script: |
      dev.set_ambient_light_int_enable(True)
      result = dev.get_ambient_light_int_enable() == True
    expect_true: true
    mode: [mock]

  - name: "data_ready returns bool"
    action: script
    script: |
      result = isinstance(dev.data_ready(), bool)
    expect_true: true
    mode: [mock]

  - name: "light_ready returns bool"
    action: script
    script: |
      result = isinstance(dev.light_ready(), bool)
    expect_true: true
    mode: [mock]

  - name: "proximity_ready returns bool"
    action: script
    script: |
      result = isinstance(dev.proximity_ready(), bool)
    expect_true: true
    mode: [mock]

  - name: "Green light returns int"
    action: script
    script: |
      dev.enable_light_sensor(False)
      result = isinstance(dev.green_light(), int)
    expect_true: true
    mode: [mock]

  - name: "Blue light returns int"
    action: script
    script: |
      dev.enable_light_sensor(False)
      result = isinstance(dev.blue_light(), int)
    expect_true: true
    mode: [mock]

  # ----- Hardware -----

  - name: "Ambient light in plausible range"
    action: call
    method: ambient_light
    expect_range: [1, 65535]
    mode: [hardware]

  - name: "Proximity in plausible range"
    action: call
    method: proximity
    expect_range: [0, 255]
    mode: [hardware]

  - name: "Light and proximity values feel correct"
    action: manual
    display:
      - method: ambient_light
        label: "Ambient light"
        unit: ""
      - method: proximity
        label: "Proximity"
        unit: ""
    prompt: "Les valeurs de lumière ambiante et de proximité sont-elles cohérentes ?"
    expect_true: true
    mode: [hardware]
