type: board
name: "board_pins"

# User pin tests for board qualification via test bench.
# These tests verify electrical continuity and GPIO/ADC functionality
# of each user-accessible pin on the edge connector and croc pads.
#
# Note: Full pin testing requires a physical test bench (jig) that
# connects each pin to a verification circuit. Tests below cover
# basic GPIO read-back; more comprehensive tests will be added
# once the test bench hardware is designed.

tests:
  - name: "Pin P0 (PC4) analog read"
    action: hardware_script
    script: |
      from machine import ADC, Pin
      adc = ADC(Pin("P0"))
      raw = adc.read_u16()
      result = 0 <= raw <= 65535
    expect_true: true
    mode: [hardware]

  - name: "Pin P1 (PA5) analog read"
