driver: ism330dl
driver_class: ISM330DL
i2c_address: 0x6B

i2c:
  id: 1

# Register values for mock tests
# Simulate an ISM330DL at rest, screen facing down
mock_registers:
  # WHO_AM_I
  0x0F: 0x6A
  # CTRL1_XL (written by configure_accel during init)
  0x10: 0x00
  # CTRL2_G (written by configure_gyro during init)
  0x11: 0x00
  # CTRL3_C (written by reset during init)
  0x12: 0x00
  # STATUS_REG (all data ready: TDA | GDA | XLDA)
  0x1E: 0x07
  # OUT_TEMP_L/H (raw=0 => 25.0°C)
  0x20: [0x00, 0x00]
  # OUTX_L_G..OUTZ_H_G (gyro all zero => stable)
  0x22: [0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
  # OUTX_L_XL..OUTZ_H_XL (z=0x4000=16384 => ~1g downward)
  0x28: [0x00, 0x00, 0x00, 0x00, 0x00, 0x40]

tests:
  # ----- Identity -----

  - name: "Verify WHO_AM_I register"
    action: read_register
    register: 0x0F
    expect: 0x6A
    mode: [mock, hardware]

  - name: "Read WHO_AM_I via method"
    action: call
    method: device_id
    expect: 0x6A
    mode: [mock, hardware]

  # ----- Status -----

  - name: "Status returns raw register value"
    action: script
    script: |
      result = isinstance(dev._status(), int)
    expect_true: true
    mode: [mock]

  - name: "Per-channel ready methods work"
    action: script
    script: |
      result = dev.accel_ready() and dev.gyro_ready() and dev.temperature_ready()
    expect_true: true
    mode: [mock]

  - name: "Data ready when all channels ready"
    action: script
    script: |
      result = dev.data_ready()
    expect_true: true
    mode: [mock]

  # ----- Accelerometer -----

  - name: "Acceleration raw returns tuple of 3 ints"
    action: script
    script: |
      raw = dev.acceleration_raw()
      result = len(raw) == 3 and all(isinstance(v, int) for v in raw)
    expect_true: true
    mode: [mock]

  - name: "Acceleration g returns expected values"
    action: script
    script: |
      ax, ay, az = dev.acceleration_g()
      result = abs(ax) < 0.01 and abs(ay) < 0.01 and abs(az - 1.0) < 0.01
    expect_true: true
    mode: [mock]

  - name: "Acceleration ms2 matches g times 9.80665"
    action: script
    script: |
      g = dev.acceleration_g()
      ms2 = dev.acceleration_ms2()
      ok = all(abs(ms2[i] - g[i] * 9.80665) < 0.01 for i in range(3))
      result = ok
    expect_true: true
    mode: [mock]

  - name: "Acceleration magnitude near 1g"
    action: script
    script: |
      ax, ay, az = dev.acceleration_g()
      mag = (ax**2 + ay**2 + az**2) ** 0.5
      result = 0.8 < mag < 1.2
    expect_true: true
    mode: [hardware]

  # ----- Gyroscope -----

  - name: "Gyroscope raw returns tuple of 3 ints"
    action: script
    script: |
      raw = dev.gyroscope_raw()
      result = len(raw) == 3 and all(isinstance(v, int) for v in raw)
    expect_true: true
    mode: [mock]

  - name: "Gyroscope dps returns zeros when static"
    action: script
    script: |
      gx, gy, gz = dev.gyroscope_dps()
      result = gx == 0.0 and gy == 0.0 and gz == 0.0
    expect_true: true
    mode: [mock]

  - name: "Gyroscope rads consistent with dps"
    action: script
    script: |
      from math import pi
      dps = dev.gyroscope_dps()
      rads = dev.gyroscope_rads()
      ok = all(abs(rads[i] - dps[i] * pi / 180.0) < 0.001 for i in range(3))
      result = ok
    expect_true: true
    mode: [mock]

  - name: "Gyroscope values plausible at rest"
    action: script
    script: |
      gx, gy, gz = dev.gyroscope_dps()
      result = abs(gx) < 20 and abs(gy) < 20 and abs(gz) < 20
    expect_true: true
    mode: [hardware]

  # ----- Temperature -----

  - name: "Temperature returns 25.0 from mock data"
    action: call
    method: temperature_c
    expect_range: [24.9, 25.1]
    mode: [mock]

  - name: "Temperature raw returns int"
    action: script
    script: |
      result = isinstance(dev.temperature_raw(), int)
    expect_true: true
    mode: [mock]

  - name: "Temperature offset shifts reading"
    action: script
    script: |
      dev.set_temp_offset(-2.5)
      result = abs(dev.temperature_c() - 22.5) < 0.1
    expect_true: true
    mode: [mock]

  - name: "Temperature with two-point calibration"
    action: script
    script: |
      dev.calibrate_temperature(20.0, 25.0, 30.0, 35.0)
      result = dev.temperature_c()
    expect_range: [19.0, 21.0]
    mode: [mock]

  - name: "Calibration rejects equal measurements"
    action: script
    script: |
      try:
          dev.calibrate_temperature(20.0, 25.0, 30.0, 25.0)
          result = False
      except ValueError:
          result = True
    expect_true: true
    mode: [mock]

  - name: "Temperature in plausible range"
    action: call
    method: temperature_c
    expect_range: [10.0, 50.0]
    mode: [hardware]

  # ----- Orientation -----

  - name: "Orientation detects SCREEN_DOWN"
    action: call
    method: orientation
    expect: "SCREEN_DOWN"
    mode: [mock]

  # ----- Motion -----

  - name: "Motion returns STABLE when static"
    action: script
    script: |
      direction, speed = dev.motion()
      result = direction == "STABLE" and speed == 0
    expect_true: true
    mode: [mock]

  # ----- Configuration -----

  - name: "Configure accel writes correct register value"
    action: script
    script: |
      from ism330dl.const import ACCEL_ODR_104HZ, ACCEL_FS_4G
      i2c.clear_write_log()
      dev.configure_accel(ACCEL_ODR_104HZ, ACCEL_FS_4G)
      log = i2c.get_write_log()
      reg, data = log[-1]
      result = reg == 0x10 and data[0] == (0x04 << 4) | (0x02 << 2)
    expect_true: true
    mode: [mock]

  - name: "Configure gyro writes correct register value"
    action: script
    script: |
      from ism330dl.const import GYRO_ODR_104HZ, GYRO_FS_500DPS
      i2c.clear_write_log()
      dev.configure_gyro(GYRO_ODR_104HZ, GYRO_FS_500DPS)
      log = i2c.get_write_log()
      reg, data = log[-1]
      result = reg == 0x11 and data[0] == (0x04 << 4) | (0x01 << 2)
    expect_true: true
    mode: [mock]

  - name: "Configure accel rejects invalid scale"
    action: script
    script: |
      from ism330dl.const import ACCEL_ODR_104HZ
      try:
          dev.configure_accel(ACCEL_ODR_104HZ, 99)
          result = False
      except Exception:
          result = True
    expect_true: true
    mode: [mock]

  - name: "Configure accel rejects invalid ODR"
    action: script
    script: |
      from ism330dl.const import ACCEL_FS_2G
      try:
          dev.configure_accel(99, ACCEL_FS_2G)
          result = False
      except Exception:
          result = True
    expect_true: true
    mode: [mock]

  - name: "Configure gyro rejects invalid scale"
    action: script
    script: |
      from ism330dl.const import GYRO_ODR_104HZ
      try:
          dev.configure_gyro(GYRO_ODR_104HZ, 99)
          result = False
      except Exception:
          result = True
    expect_true: true
    mode: [mock]

  - name: "Configure gyro rejects invalid ODR"
    action: script
    script: |
      from ism330dl.const import GYRO_FS_250DPS
      try:
          dev.configure_gyro(99, GYRO_FS_250DPS)
          result = False
      except Exception:
          result = True
    expect_true: true
    mode: [mock]

  # ----- Power -----

  - name: "Power down writes zero to CTRL registers"
    action: script
    script: |
      i2c.clear_write_log()
      dev.power_off()
      log = i2c.get_write_log()
      writes = {reg: data[0] for reg, data in log}
      result = writes.get(0x10) == 0 and writes.get(0x11) == 0
    expect_true: true
    mode: [mock]

  # ----- Soft reset -----

  - name: "Soft reset sets BDU and IF_INC in CTRL3_C"
    action: script
    script: |
      i2c.clear_write_log()
      dev.soft_reset()
      log = i2c.get_write_log()
      ctrl3_writes = [data[0] for reg, data in log if reg == 0x12]
      bdu_if_inc = (1 << 6) | (1 << 2)
      result = len(ctrl3_writes) == 2 and ctrl3_writes[1] == bdu_if_inc
    expect_true: true
    mode: [mock]

  # ----- Auto-trigger -----

  - name: "Acceleration readable after power down"
    action: script
    script: |
      dev.power_off()
      ax, ay, az = dev.acceleration_g()
      result = isinstance(ax, float) and isinstance(ay, float) and isinstance(az, float)
    expect_true: true
    mode: [mock]

  - name: "Gyroscope readable after power down"
    action: script
    script: |
      dev.power_off()
      gx, gy, gz = dev.gyroscope_dps()
      result = isinstance(gx, float) and isinstance(gy, float) and isinstance(gz, float)
    expect_true: true
    mode: [mock]

  - name: "Temperature readable after power down"
    action: script
    script: |
      dev.power_off()
      t = dev.temperature_c()
      result = isinstance(t, float)
    expect_true: true
    mode: [mock]

  - name: "Auto-trigger restores ODR after power down"
    action: script
    script: |
      dev.power_off()
      dev.acceleration_raw()
      ctrl1 = i2c.readfrom_mem(dev.address, 0x10, 1)[0]
      ctrl2 = i2c.readfrom_mem(dev.address, 0x11, 1)[0]
      result = (ctrl1 & 0xF0) != 0 and (ctrl2 & 0xF0) != 0
    expect_true: true
    mode: [mock]

  - name: "Auto-trigger preserves custom ODR"
    action: script
    script: |
      from ism330dl.const import ACCEL_ODR_26HZ, ACCEL_FS_2G, GYRO_ODR_52HZ, GYRO_FS_250DPS
      dev.configure_accel(ACCEL_ODR_26HZ, ACCEL_FS_2G)
      dev.configure_gyro(GYRO_ODR_52HZ, GYRO_FS_250DPS)
      dev.power_off()
      dev.acceleration_raw()
      ctrl1 = i2c.readfrom_mem(dev.address, 0x10, 1)[0]
      ctrl2 = i2c.readfrom_mem(dev.address, 0x11, 1)[0]
      accel_odr = (ctrl1 >> 4) & 0x0F
      gyro_odr = (ctrl2 >> 4) & 0x0F
      result = accel_odr == ACCEL_ODR_26HZ and gyro_odr == GYRO_ODR_52HZ
    expect_true: true
    mode: [mock]

  - name: "Repeated power down and read cycle"
    action: script
    script: |
      dev.power_off()
      a1 = dev.acceleration_g()
      dev.power_off()
      a2 = dev.acceleration_g()
      result = len(a1) == 3 and len(a2) == 3
    expect_true: true
    mode: [mock]

  - name: "No register write when already active"
    action: script
    script: |
      dev.acceleration_raw()
      i2c.clear_write_log()
      dev.acceleration_raw()
      log = i2c.get_write_log()
      result = len(log) == 0
    expect_true: true
    mode: [mock]

  - name: "Timeout raises OSError when data never ready"
    action: script
    script: |
      dev.power_off()
      i2c._registers[0x1E] = bytes([0x00])
      try:
          dev.acceleration_raw()
          result = False
      except OSError:
          result = True
      i2c._registers[0x1E] = bytes([0x07])
    expect_true: true
    mode: [mock]

  - name: "Fresh acceleration after power down"
    action: script
    script: |
      dev.power_off()
      ax, ay, az = dev.acceleration_g()
      mag = (ax**2 + ay**2 + az**2) ** 0.5
      result = 0.8 < mag < 1.2
    expect_true: true
    mode: [hardware]

  - name: "Fresh temperature after power down"
    action: script
    script: |
      dev.power_off()
      t = dev.temperature_c()
      result = 10.0 < t < 50.0
    expect_true: true
    mode: [hardware]

  # ----- Hardware manual -----

  - name: "Sensor readings feel correct"
    action: manual
    display:
      - method: acceleration_g
        label: "Acceleration (g)"
        unit: ""
      - method: gyroscope_dps
        label: "Gyroscope (dps)"
        unit: ""
      - method: temperature_c
        label: "Temperature"
        unit: "°C"
      - method: orientation
        label: "Orientation"
        unit: ""
    prompt: "Les valeurs d'accélération, rotation, température et orientation sont-elles cohérentes ?"
    expect_true: true
    mode: [hardware]
