name: "🔎 Python Linter"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: "⏳ Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          cache: "pip"
          cache-dependency-path: pyproject.toml
          python-version: "3.10"

      - name: "🛠 Install dependencies"
        run: python3 -m pip install -e ".[dev]"

      - name: "😾 Lint with ruff"
        run: make lint
